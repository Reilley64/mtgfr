name: Docker

# Deploy PRD §GitHub Actions — build + push GHCR images after semantic-release publishes a
# GitHub Release. Not part of the semantic-release pipeline itself; images are pinned to the
# release tag, never `latest` (Terraform pins explicit versions in terraform.tfvars).

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DATABASE_URL: postgresql://mtgfr:mtgfr@localhost:5432/mtgfr

jobs:
  docker:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mtgfr
          POSTGRES_PASSWORD: mtgfr
          POSTGRES_DB: mtgfr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mtgfr -d mtgfr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@v3

      - name: Install client dependencies
        run: cd client && bun install --frozen-lockfile

      - name: Apply Toasty migrations
        run: cargo run -p server -- migration apply

      - name: just check (format + lint + typecheck + test)
        run: just check

      - name: Verify committed OpenAPI client matches the schema crate at this tag
        run: |
          just server-codegen
          git diff --exit-code -- client/src/api/generated.ts

      - name: Compute image version (strip leading v from the tag)
        id: version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mtgfr-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mtgfr-server:${{ steps.version.outputs.version }}

      - name: Build and push mtgfr-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mtgfr-web:${{ steps.version.outputs.version }}
          # Override via repo Actions variables `VITE_API_ORIGIN` / `VITE_CARD_CDN`.
          # Defaults match the Dockerfile (example.com API; no card CDN → Scryfall fallback).
          build-args: |
            VITE_API_ORIGIN=${{ vars.VITE_API_ORIGIN || 'https://api.edh.example.com' }}
            VITE_CARD_CDN=${{ vars.VITE_CARD_CDN }}

      - name: Make GHCR packages public
        # GHCR packages default to private on first push. Best-effort: flips visibility to public
        # (deploy PRD — "public GHCR packages; no imagePullSecret on nodes"). Safe to re-run; a
        # 404/403 here (e.g. insufficient token scope) does not fail the release — flip visibility
        # by hand once in repo/org package settings if this step can't.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in mtgfr-server mtgfr-web; do
            gh api --method PATCH \
              "/user/packages/container/${pkg}" \
              -f visibility=public || true
          done
