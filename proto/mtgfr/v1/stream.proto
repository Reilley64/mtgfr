message VisibleEventSpellCast {
  uint32 spell = 1;
  uint32 from = 2;
  uint32 controller = 3;
  optional WireTarget target = 4;
  // Whether this was a flashback cast (CR 702.34) — public, like the rest of the stack.
  bool flashback = 5;
  // Whether this was an escape cast (CR 702.19) — public, like the rest of the stack.
  bool escape = 6;
}

// A multi-target spell's chosen targets were recorded (CR 601.2c). Public — the stack is
// visible, so every seat sees what a spell targets.
message VisibleEventSpellTargetsChosen {
  uint32 spell = 1;
  repeated WireTarget targets = 2;
}

// A permanent's "prepared" status changed (soc/sos prepare DFCs). Public battlefield status.
message VisibleEventPreparedChanged {
  uint32 object = 1;
  bool prepared = 2;
}

// A Class permanent gained a level (CR 717.2). Public battlefield status, like
// `PreparedChanged`.
message VisibleEventLeveledUp {
  uint32 object = 1;
  uint32 level = 2;
}

// A permanent phased out (CR 702.26 — Guardian of Faith). Public battlefield status.
message VisibleEventPhasedOut {
  uint32 object = 1;
}

// A permanent phased in (CR 702.26f — at its controller's untap). Public, the mirror of
// `PhasedOut`.
message VisibleEventPhasedIn {
  uint32 object = 1;
}

// An as-enters "choose a creature type" choice was answered (CR 614.12/700.9-style —
// Patchwork Banner). Public battlefield status, like `PreparedChanged`.
message VisibleEventCreatureTypeChosen {
  uint32 object = 1;
  string subtype = 2;
}

// An as-enters "choose a color" choice was answered (CR 614.12/700.9-style — Flickering
// Ward). Public battlefield status, like `CreatureTypeChosen`. `color` is the WUBRG index.
message VisibleEventColorChosen {
  uint32 object = 1;
  uint32 color = 2;
}

// A permanent flipped (CR 712 — a Kamigawa flip card): it now uses its back face's
// characteristics. Public battlefield status, like `PreparedChanged`.
message VisibleEventFlipped {
  uint32 object = 1;
}

// `object` was marked to skip its controller's next untap step (Pollen Lullaby's win rider).
message VisibleEventNextUntapSkipMarked {
  uint32 object = 1;
}

// `object`'s skip-next-untap mark was consumed as its controller's untap step arrived.
message VisibleEventNextUntapSkipConsumed {
  uint32 object = 1;
}

// A "becomes the color of your choice until end of turn" choice was answered (CR 613.3c layer 5
// — Wild Mongrel). Public battlefield status, like `ColorChosen`; `color` is the WUBRG index.
message VisibleEventColorSetUntilEndOfTurn {
  uint32 object = 1;
  uint32 color = 2;
}

// A creature dealt combat damage to another creature (public — combat damage is announced to
// the table, CR 510.1c/510.4) — the creature-target twin of `CombatDamageDealtToPlayer`.
message VisibleEventCombatDamageDealtToCreature {
  uint32 source = 1;
  uint32 target = 2;
  int32 amount = 3;
}

// A copy of a prepared permanent's back-face spell went on the stack (soc/sos prepare DFCs).
// Public — the stack is visible.
message VisibleEventPreparedSpellCast {
  uint32 spell = 1;
  uint32 source = 2;
  uint32 controller = 3;
  optional WireTarget target = 4;
  // The back face's chosen `{X}` value (0 for a non-`{X}` back face) — public, like the rest
  // of the stack.
  uint32 x = 5;
}

// The adventure half of an adventure card went on the stack (CR 715). Public — the stack is
// visible.
message VisibleEventAdventureSpellCast {
  uint32 spell = 1;
  uint32 source = 2;
  uint32 controller = 3;
  optional WireTarget target = 4;
  // The adventure's chosen `{X}` value (0 for a non-`{X}` adventure) — public.
  uint32 x = 5;
}

message VisibleEventStepBegan {
  // Step discriminant; see `engine::Step`.
  uint32 step = 1;
  uint32 active_player = 2;
}

// A triggered ability went on the stack (its effect detail is engine-internal).
message VisibleEventTriggeredAbilityOnStack {
  uint32 controller = 1;
  uint32 source = 2;
  optional WireTarget target = 3;
}

message VisibleEventAbilityResolved {
  uint32 source = 1;
}

message VisibleEventLandPlayed {
  uint32 permanent = 1;
  uint32 from = 2;
  uint32 player = 3;
}

message VisibleEventTapped {
  uint32 object = 1;
}

message VisibleEventUntapped {
  uint32 object = 1;
}

// A permanent was removed from combat (CR 506.4 — `Effect::RemoveFromCombat`).
message VisibleEventRemovedFromCombat {
  uint32 object = 1;
}

// A regeneration shield was granted to a permanent (CR 701.15b).
message VisibleEventRegenerationShieldCreated {
  uint32 object = 1;
}

// A permanent was regenerated instead of destroyed (CR 701.15b) — tapped, removed from combat,
// damage healed, one shield consumed.
message VisibleEventRegenerated {
  uint32 object = 1;
}

// A permanent's regeneration shields expired at cleanup (CR 701.15b's "this turn").
message VisibleEventRegenerationShieldsExpired {
  uint32 object = 1;
}

message VisibleEventLostSummoningSickness {
  uint32 object = 1;
}

message VisibleEventCountersPlaced {
  uint32 object = 1;
  int32 count = 2;
}

// A named non-P/T counter (CR 122.1 — charge, story, …) was placed on (`count` positive) or
// removed from (negative) a permanent — the `CountersPlaced` sibling for a counter kind other
// than +1/+1. `counter_kind` mirrors `engine::CounterKind`'s discriminant.
message VisibleEventKindCountersPlaced {
  uint32 object = 1;
  uint32 counter_kind = 2;
  int32 count = 3;
}

// A planeswalker's loyalty changed by `amount` (a loyalty ability's +N / 0 / −N cost).
message VisibleEventLoyaltyChanged {
  uint32 object = 1;
  int32 amount = 2;
}

// A planeswalker's once-per-turn loyalty flag was set/cleared (CR 606.3).
message VisibleEventLoyaltyActivated {
  uint32 object = 1;
  bool active = 2;
}

// A `once_each_turn`-capped activated ability was activated (CR 602.2b).
message VisibleEventAbilityActivatedThisTurn {
  uint32 object = 1;
  uint64 ability_index = 2;
}

// A `once_each_turn`-capped *triggered* ability (Morbid Opportunist, Tocasia's Welcome) was
// placed on the stack.
message VisibleEventTriggeredAbilityThisTurn {
  uint32 source = 1;
}

// An Aura/Equipment's attachment changed (`host` absent = became unattached).
message VisibleEventAttachedTo {
  uint32 object = 1;
  optional uint32 host = 2;
}

message VisibleEventTempBoost {
  uint32 object = 1;
  int32 power = 2;
  int32 toughness = 3;
}

message VisibleEventTempBoostsEnded {
  uint32 object = 1;
}

// A permanent's base power/toughness was set until end of turn (Biomass Mutation, Quandrix
// Charm). Public battlefield status, like `TempBoost`.
message VisibleEventBasePtSetUntilEndOfTurn {
  uint32 object = 1;
  int32 power = 2;
  int32 toughness = 3;
}

// A permanent gained card types/subtypes until end of turn (Restless Spire's
// self-animation). Public battlefield status, like `BasePtSetUntilEndOfTurn`.
message VisibleEventTypesAddedUntilEndOfTurn {
  uint32 object = 1;
}

// A just-reanimated permanent took on an indefinite characteristics set (Excava, the Risen
// Past → a 1/1 Spirit with flying). Public battlefield status, like `BasePtSetUntilEndOfTurn`.
message VisibleEventReanimatedCreatureBecame {
  uint32 object = 1;
}

// A permanent gained an indefinite set of creature subtypes (Hofri Ghostforge's minted copy →
// a Spirit). Public battlefield status, like `ReanimatedCreatureBecame`.
message VisibleEventAddedSubtypes {
  uint32 object = 1;
}

// A permanent became a copy of another creature as it entered (Altered Ego, Cursed Mirror).
// Public — a copy is public.
message VisibleEventBecameCopy {
  uint32 object = 1;
}

// A permanent lost keywords until end of turn and can't regain them
// (arcane_lighthouse's strip). Public battlefield status, like `TempBoost`.
message VisibleEventKeywordsStripped {
  uint32 object = 1;
}

// A one-shot control change took effect (CR 720): `object` is now controlled by `controller`
// until end of turn (Besmirch).
message VisibleEventControlGainedUntilEndOfTurn {
  uint32 object = 1;
  uint32 controller = 2;
}

// An until-end-of-turn control override ended (cleanup, CR 514.2).
message VisibleEventControlEndedUntilEndOfTurn {
  uint32 object = 1;
}

// `target` gained `source`'s other abilities until end of turn (CR 702.166 Backup — Guardian
// Scalelord). Public battlefield state.
message VisibleEventAbilitiesGranted {
  uint32 target = 1;
  uint32 source = 2;
}

// Every until-end-of-turn ability grant ended (cleanup, CR 514.2 / 702.166).
message VisibleEventGrantedAbilitiesEnded {}

// A permanent control change with no stated duration (CR 720 — Entrancing Melody): `object` is
// now controlled by `controller`, with no cleanup reversion.
message VisibleEventControlGained {
  uint32 object = 1;
  uint32 controller = 2;
}

message VisibleEventAttackerDeclared {
  uint32 object = 1;
  uint32 defender = 2;
}

// A token was put onto the battlefield already tapped and attacking `defender` (Combat
// Calligrapher), not via the declare-attackers step (CR 508.4).
message VisibleEventTokenEnteredAttacking {
  uint32 token = 1;
  uint32 defender = 2;
}

// A creature was goaded by player `by` (CR 701.38).
message VisibleEventGoaded {
  uint32 object = 1;
  uint32 by = 2;
}

// Every goad done by player `by` ended (the start of `by`'s turn).
message VisibleEventGoadCleared {
  uint32 by = 1;
}

// A vow counter was placed on `object`, marking `protected` as the player it can't attack
// (Promise of Loyalty). Public — a counter placement happens openly, like the other counters.
message VisibleEventVowCountersPlaced {
  uint32 object = 1;
  uint32 protected = 2;
}

// `count` time counters were placed on the suspended card `card` in exile (Rousing Refrain,
// suspend). Public — a suspended card sits face-up in exile with its counters visible.
message VisibleEventTimeCountersPlaced {
  uint32 card = 1;
  uint32 count = 2;
}

// One time counter was removed from the suspended card `card` (the upkeep tick). Public, like
// `TimeCountersPlaced`.
message VisibleEventTimeCountersRemoved {
  uint32 card = 1;
}

// `object` must attack `defender` this turn if able (Furygale Flocking's minted tokens).
// Public combat state, like `Goaded`.
message VisibleEventMustAttackDeclared {
  uint32 object = 1;
  uint32 defender = 2;
}

// A CR 603.7 delayed trigger was scheduled: `controller` will act the next time its step
// begins (the effect/step detail is engine-internal, like `TriggeredAbilityOnStack`'s).
message VisibleEventDelayedTriggerScheduled {
  uint32 controller = 1;
  uint32 source = 2;
}

// Every scheduled delayed trigger for one step fired.
message VisibleEventDelayedTriggersFired {}

// A CR 603.7 delayed one-shot was armed: `controller` will act the next time they cast a spell
// matching its filter this turn (the filter/effect detail is engine-internal, like
// `DelayedTriggerScheduled`'s).
message VisibleEventNextCastTriggerArmed {
  uint32 controller = 1;
  uint32 source = 2;
}

// A `NextCastTriggerArmed` watch fired and was removed.
message VisibleEventNextCastTriggerConsumed {
  uint32 controller = 1;
  uint32 source = 2;
}

// A CR 603.7 delayed watch was armed: `source` will become prepared the first time `watched`
// deals combat damage to a player, any time later this combat.
message VisibleEventCombatDamageWatchArmed {
  uint32 controller = 1;
  uint32 source = 2;
  uint32 watched = 3;
}

// A `CombatDamageWatchArmed` watch fired and was removed.
message VisibleEventCombatDamageWatchConsumed {
  uint32 controller = 1;
  uint32 source = 2;
}

// A this-turn, controller-scoped, repeatable CR 603.7 delayed watch was armed: every creature
// `controller` controls that deals combat damage to a player for the rest of this turn mints a
// free copy of `card` (an already-exiled instant/sorcery). Unlike `CombatDamageWatchArmed`,
// never consumed — it keeps firing until the turn ends.
message VisibleEventCombatDamageCopyArmed {
  uint32 controller = 1;
  uint32 source = 2;
  uint32 card = 3;
}

// A card was impulse-exiled face-up and `player` may play it until end of turn, or until the
// end of `player`'s next turn if `until_next_turn` (CR 118.6; Atsushi, the Blazing Sky).
// Public — the card is exiled face-up, like a card milled into a graveyard.
message VisibleEventExiledFromLibraryMayPlay {
  uint32 player = 1;
  uint32 card = 2;
  uint32 from = 3;
  bool until_next_turn = 4;
}

// A card was exiled face-up from the top of the library with no play permission attached
// (Herald of Amity's dig) — a follow-up choice decides which one, if any, gets free-cast
// permission. Public — the card is exiled face-up.
message VisibleEventExiledFromLibraryToChooseCastFree {
  uint32 player = 1;
  uint32 card = 2;
  uint32 from = 3;
}

// An extended impulse-draw permission's shield expired (its controller's own next turn began)
// — it now expires at this turn's cleanup like a normal permission.
message VisibleEventPlayFromExilePermissionArmed {
  uint32 card = 1;
}

// All impulse-draw play-until-end-of-turn permissions that aren't still shielded expired
// (cleanup).
message VisibleEventPlayFromExileEnded {}

message VisibleEventBlockerDeclared {
  uint32 blocker = 1;
  uint32 attacker = 2;
}

// A multi-blocked attacker's combat damage was divided among its blockers (public — combat
// damage assignment is announced to the table, CR 510.1c).
message VisibleEventCombatDamageDivided {
  uint32 attacker = 1;
  repeated ObjectAmount assignment = 2;
}

// A divided-damage spell's total was split among its chosen targets (public — a divided burn
// spell's split is announced to the table, CR 601.2d, like combat's). `players` carries the
// shares dealt to player targets ("any number of targets" includes players); `assignment` the
// object shares.
message VisibleEventSpellDamageDivided {
  uint32 spell = 1;
  repeated ObjectAmount assignment = 2;
  repeated PlayerAmount players = 3;
}

// A divided-counters spell's total was split among its chosen targets (public — CR 601.2d, the
// counter twin of `SpellDamageDivided`; Grove's Bounty).
message VisibleEventSpellCountersDivided {
  uint32 spell = 1;
  repeated ObjectAmount assignment = 2;
}

message VisibleEventDeathtouchMarked {
  uint32 object = 1;
}

message VisibleEventCombatCleared {}

message VisibleEventCommanderCastFromCommandZone {
  uint32 player = 1;
}

// `player` may cast spells this turn as though they had flash (CR 601.3a — Alchemist's
// Refuge). Public — no hidden information.
message VisibleEventFlashPermissionGranted {
  uint32 player = 1;
}

// `player` may, at mana-ability timing, pay 1 life to add {C} for the rest of the turn (CR 605
// — Yavimaya Bloomsage's Channel). Public — no hidden information.
message VisibleEventChannelColorlessManaGranted {
  uint32 player = 1;
}

message VisibleEventCommanderDamageDealt {
  uint32 source = 1;
  uint32 player = 2;
  int32 amount = 3;
}

// A creature dealt combat damage to a player (public — combat damage is announced to the
// table, CR 510.1c/510.4).
message VisibleEventCombatDamageDealtToPlayer {
  uint32 source = 1;
  uint32 player = 2;
  int32 amount = 3;
}

// `amount` combat damage that would have been dealt to `player` was prevented by a shield
// (Inkshield, CR 615) — public, like the combat damage it replaces. The Inkling mints it
// drives arrive as accompanying `TokenCreated` events.
message VisibleEventCombatDamagePrevented {
  uint32 player = 1;
  int32 amount = 2;
}

message VisibleEventMovedToCommandZone {
  uint32 card = 1;
  uint32 from = 2;
}

message VisibleEventManaEmptied {
  uint32 player = 1;
}

message VisibleEventDamageCleared {
  uint32 object = 1;
}

message VisibleEventManaAdded {
  uint32 player = 1;
  // Mana kind: 0-4 = WUBRG (`engine::Color::index`), 5 = colorless `{C}`, 6 = any color, 7 =
  // either of two colors (a dual land's credit), 8 = a restricted color-set credit (Fellwar
  // Stone / Exotic Orchard).
  uint32 mana = 2;
  uint32 amount = 3;
}

message VisibleEventManaSpent {
  uint32 player = 1;
  // Per-color amounts removed, indexed WUBRG.
  repeated uint32 mana = 2;
}

message VisibleEventPriorityPassed {
  uint32 player = 1;
}

message VisibleEventPermanentEntered {
  uint32 permanent = 1;
  uint32 from = 2;
}

// A graveyard card was reanimated onto the battlefield under `controller`'s control.
message VisibleEventReanimatedToBattlefield {
  uint32 permanent = 1;
  uint32 from = 2;
  uint32 controller = 3;
  // Whether it entered with a finality counter (CR 614.12 — Excava, the Risen Past).
  bool finality = 4;
  // Whether it entered tapped (Teacher's Pest's "... to the battlefield tapped").
  bool tapped = 5;
}

message VisibleEventTokenCreated {
  uint32 token = 1;
  uint32 controller = 2;
  // Resolving stack object or ability source that produced the token (ADR 0033).
  optional uint32 creator = 3;
}

message VisibleEventTokenCeasedToExist {
  uint32 token = 1;
}

// A spell on the stack was copied (Twincast): a new spell object `copy` was put on the stack
// above `original`, controlled by `controller`.
message VisibleEventSpellCopied {
  uint32 copy = 1;
  uint32 original = 2;
  uint32 controller = 3;
}

// A spell copy resolved and ceased to exist (it left the stack without becoming a card).
message VisibleEventSpellCeasedToExist {
  uint32 spell = 1;
}

message VisibleEventDamageMarked {
  uint32 object = 1;
  int32 amount = 2;
  // What dealt the damage (for the log); absent for engine-internal adjustments.
  optional uint32 source = 3;
}

message VisibleEventMovedToGraveyard {
  uint32 card = 1;
  uint32 from = 2;
}

message VisibleEventMovedToExile {
  uint32 card = 1;
  uint32 from = 2;
}

// An adventure spell resolved and was exiled "on an adventure" (CR 715.3d) as the card `card`.
// Public, like `MovedToExile` (the exile zone is visible).
message VisibleEventExiledOnAdventure {
  uint32 card = 1;
  uint32 from = 2;
  uint32 owner = 3;
}

// The O-Ring pattern (CR 603.6e): `object` was exiled until `source` leaves the battlefield.
message VisibleEventExiledUntilSourceLeaves {
  uint32 source = 1;
  uint32 object = 2;
}

// Skyclave Apparition's linked exile: `object` was exiled linked to `source`, staying exiled
// forever — `source` leaving the battlefield mints its owner an Illusion instead of returning
// it (see `LeavesIllusionMinted`).
message VisibleEventExiledUntilSourceLeavesMintingIllusion {
  uint32 source = 1;
  uint32 object = 2;
}

// `source`'s linked exile (see `ExiledUntilSourceLeavesMintingIllusion`) finished minting its
// Illusion token — the exiled `object` stays exiled; the mint itself is a separate, public
// `TokenCreated`.
message VisibleEventLeavesIllusionMinted {
  uint32 source = 1;
  uint32 object = 2;
}

// Hofri Ghostforge's minted Spirit token `token` gained its granted "When this token leaves
// the battlefield, return the exiled card to its owner's graveyard" rider, linked to the
// specific card `exiled` it must return.
message VisibleEventTokenGrantedReturnExiledOnLeave {
  uint32 token = 1;
  uint32 exiled = 2;
}

// The granted rider's payoff: the exile-zone card `from` arrived in its owner's graveyard as
// `card` (public — the graveyard is a public zone). Not a death (CR 700.4 requires "from the
// battlefield").
message VisibleEventReturnedExiledCardToGraveyard {
  uint32 card = 1;
  uint32 from = 2;
}

// The "exiled with" pattern (CR 400.10a): `object` was exiled linked to `source`, staying
// there until a different ability of `source` cashes it out (Currency Converter).
message VisibleEventExiledWithSource {
  uint32 source = 1;
  uint32 object = 2;
}

// `source`'s cash-out ability pulled `object` back out of its exiled-with pile.
message VisibleEventCardExiledWithSourceLeftExile {
  uint32 source = 1;
  uint32 object = 2;
}

// Quintorius, Loremaster's activated ability granted `player` permission to cast `card` (still
// sitting in its exiled-with pile) this turn without paying its mana cost. Public — the card is
// exile-zone, like the rest of the "exiled with" pattern.
message VisibleEventCastFromExileFreePermissionGranted {
  uint32 card = 1;
  uint32 player = 2;
}

// Quintorius, Loremaster's activated ability also granted `card` a one-shot "put into a
// graveyard" replacement (CR 614.6) — bottom of its owner's library instead. Public, like the
// rest of the "exiled with" pattern.
message VisibleEventCastFromExileFreeBottomsLibraryOnLeave {
  uint32 card = 1;
}

// Every active free-cast-from-exile permission expired (cleanup).
message VisibleEventCastFromExileFreeEnded {}

// The linked exile ended: the card `from` returned to the battlefield as `permanent`, under
// `controller`'s control.
message VisibleEventReturnedFromLinkedExile {
  uint32 permanent = 1;
  uint32 from = 2;
  uint32 controller = 3;
  uint32 source = 4;
}

message VisibleEventReturnedToHand {
  uint32 card = 1;
  uint32 from = 2;
}

message VisibleEventTuckedToLibrary {
  uint32 card = 1;
  uint32 from = 2;
  bool to_top = 3;
}

// `player`'s library was shuffled (Perpetual Timepiece's mandatory shuffle). No order
// information — the library is a hidden zone.
message VisibleEventLibraryShuffled {
  uint32 player = 1;
}

// The top card of `player`'s library was revealed — public to every player (CR 701.30), unlike
// a private look. The card stays on top; a later event moves it if the effect does.
message VisibleEventRevealedTopOfLibrary {
  uint32 player = 1;
  uint32 card = 2;
  string def = 3;
}

// A previously-revealed card went to the bottom of `player`'s own library (Open the Way's
// non-matching reveals) — public, since `RevealedTopOfLibrary` already showed it; not a zone
// change, so `card` keeps its id.
message VisibleEventPutOnBottomOfLibrary {
  uint32 player = 1;
  uint32 card = 2;
}

// A tutored library card entered `player`'s hand. Like a draw, the identity is private —
// `card` (and the library object it came `from`, which would otherwise leak that identity by
// its decklist-order id) are absent for anyone but the searcher.
message VisibleEventSearchedToHand {
  uint32 player = 1;
  uint32 object = 2;
  optional uint32 from = 3;
  optional string card = 4;
}

// A searched library card was put onto the battlefield under `controller`'s control (ramp /
// fetchland). The card is public once it's on the battlefield.
message VisibleEventSearchedToBattlefield {
  uint32 permanent = 1;
  uint32 from = 2;
  uint32 controller = 3;
  bool tapped = 4;
}

// A library card was manifested (CR 701.34) onto the battlefield face down as a 2/2 under
// `controller`'s control. The moved card's identity is private, so `from` is dropped — the
// anonymous permanent is projected via `ObjectView::face_down`.
message VisibleEventManifested {
  uint32 permanent = 1;
  uint32 controller = 2;
}

// A face-down permanent was turned face up (CR 701.34e) — its real card is now revealed
// (public game information).
message VisibleEventTurnedFaceUp {
  uint32 permanent = 1;
}

// A hand land card was put onto the battlefield under `controller`'s control (CR 305.9, not a
// land play — Eureka Moment, Zimone). The card is public once it's on the battlefield.
message VisibleEventPutOntoBattlefieldFromHand {
  uint32 permanent = 1;
  uint32 from = 2;
  uint32 controller = 3;
  bool tapped = 4;
}

// A card was milled into `player`'s graveyard (public — the graveyard is a public zone).
message VisibleEventMilled {
  uint32 player = 1;
  uint32 card = 2;
  uint32 from = 3;
}

message VisibleEventLifeChanged {
  uint32 player = 1;
  int32 amount = 2;
  // What caused the change (for the log); absent for setup adjustments.
  optional uint32 source = 3;
}

message VisibleEventDrewFromEmptyLibrary {
  uint32 player = 1;
}

message VisibleEventPlayerLost {
  uint32 player = 1;
}

// `player` got the city's blessing (CR 702.131 Ascend) — fully public.
message VisibleEventCitysBlessingGained {
  uint32 player = 1;
}

// Opponents see that a draw happened, but `card` (and the library object it came `from`, which
// would otherwise leak that identity by its decklist-order id) are absent for anyone but the
// drawer.
message VisibleEventCardDrawn {
  uint32 player = 1;
  uint32 object = 2;
  optional uint32 from = 3;
  optional string card = 4;
}

// A permanent was sacrificed by `by` — public (a sacrifice happens openly on the battlefield),
// like `MovedToGraveyard`/`TokenCeasedToExist`, which fire alongside this for the actual zone
// change.
message VisibleEventSacrificed {
  uint32 object = 1;
  uint32 by = 2;
}

// A card was discarded by `player` — public (a discard happens openly to the graveyard), like
// `Sacrificed`, which fires alongside `MovedToGraveyard` for the actual zone change.
message VisibleEventDiscarded {
  uint32 card = 1;
  uint32 from = 2;
  uint32 player = 3;
}

// `player` put a card from hand onto the top of their library (Brainstorm resolving) — a
// hidden-zone-to-hidden-zone move, like `CardDrawn`: `from` and `def` are absent for anyone but
// `player`.
message VisibleEventPutFromHandOnTop {
  uint32 player = 1;
  uint32 card = 2;
  optional uint32 from = 3;
  optional string def = 4;
}

// A graveyard card was impulse-exiled face-up and `player` may play it until end of turn
// (Containment Construct's discard payoff, CR 601 impulse play). Public, like
// `ExiledFromLibraryMayPlay`.
message VisibleEventExiledFromGraveyardMayPlay {
  uint32 player = 1;
  uint32 card = 2;
  uint32 from = 3;
}

// An activated ability on the stack was countered (CR 701.5c/112.7a — Azorius Guildmage). It
// leaves the stack and ceases to exist; nothing is hidden (which ability was countered is
// public), so this is a straight passthrough of the engine event's `source`.
message VisibleEventAbilityCountered {
  uint32 source = 1;
}

// A condition-scoped control change took effect (CR 611.2b — Rubinia Soulsinger): `object` is
// now controlled by `controller` for as long as the condition holds.
message VisibleEventConditionedControlGained {
  uint32 object = 1;
  uint32 controller = 2;
}

// A condition-scoped control override ended because its condition stopped holding (the source
// untapped, left, or changed controller — CR 611.2b).
message VisibleEventConditionedControlEnded {
  uint32 object = 1;
}

// `source` dealt noncombat damage to `player` (public — damage to a player is announced, CR
// 120.1) — the noncombat twin of `CombatDamageDealtToPlayer`.
message VisibleEventDamageDealtToPlayer {
  uint32 source = 1;
  uint32 player = 2;
  int32 amount = 3;
}

// A flicker's return (immediate or the delayed end-step twin): the exiled card `from` returned
// to the battlefield as `permanent`, under `controller`'s control.
message VisibleEventFlickeredToBattlefield {
  uint32 permanent = 1;
  uint32 from = 2;
  uint32 controller = 3;
}

// A batch of already-redacted events for one viewer plus the viewer's full render state after
// they were applied. The `events` drive the game log / stack panel / combat highlights
// (folded client-side); `state` is the board the client renders.
message DeltaEnvelope {
  uint64 seq = 1;
  repeated VisibleEvent events = 2;
  VisibleState state = 3;
  // Human-readable labels of actions the server auto-submitted in this frame (a forced
  // discard, an auto-passed priority with nothing to do) — for the client's "automatic"
  // styling, so a forced play is never mistaken for the player's own move.
  repeated string auto_actions = 4;
}

message SnapshotFrame {
  uint64 seq = 1;
  VisibleState state = 2;
}

message Heartbeat {}

// The stream's per-line frame union: an initial full snapshot, a per-event delta, or a
// keepalive heartbeat (ADR 0006).
message StreamFrame {
  oneof frame {
    SnapshotFrame snapshot = 1;
    DeltaEnvelope delta = 2;
    Heartbeat heartbeat = 3;
  }
}
