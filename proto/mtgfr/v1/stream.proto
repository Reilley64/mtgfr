syntax = "proto3";

package mtgfr.v1;

import "mtgfr/v1/common.proto";

option java_multiple_files = true;

// Per-viewer snapshot/delta stream: board view, pending choices, visible events.

// Per-player public facts plus that player's private counts.
message PlayerView {
  uint32 player = 1;
  // Display name from the seated account (not unique across players).
  string username = 2;
  int32 life = 3;
  // Extra generic mana to recast this player's commander from the command zone.
  uint32 commander_tax = 4;
  bool lost = 5;
  // Card count only — hand identities are private (see the object list for own hand).
  uint32 hand_count = 6;
  uint32 library_count = 7;
  // Floating mana pool for this player (every credit kind). Shown under each life orb.
  WireManaPool mana_pool = 8;
  // Commander damage this player has taken, one entry per commander that has connected.
  repeated CommanderDamageView commander_damage = 9;
  // Completed pre-game mulligans this player has taken.
  uint32 mulligans_taken = 10;
  // Whether this player has kept their current opening hand.
  bool hand_kept = 11;
  // Whether this player may still take another pre-game mulligan.
  bool can_mulligan = 12;
}

// One source card def's contributions to a permanent (Alt-inspect ledger).
message ModifierSourceView {
  // Card def name — clicking inspects this catalog card.
  string source_name = 1;
  // Card id when a matching battlefield permanent is still present; empty for synthetic labels.
  string source_card_id = 2;
  // Display crumbs: "+1/+1", "Flying", "goaded", "controls", "mana ability", …
  repeated string contributions = 3;
}

// One object the viewer may see, with its render-relevant state.
message ObjectView {
  uint32 id = 1;
  // Zone discriminant; see `engine::Zone`.
  uint32 zone = 2;
  uint32 owner = 3;
  uint32 controller = 4;
  // Card id (Scryfall oracle id). Empty when face-down or a token without one.
  string card_id = 5;
  string name = 6;
  // Printing UUID for art (CDN). Empty when unknown / token without art.
  string print = 7;
  WireKind kind = 8;
  WireCost mana_cost = 9;
  // Whether casting this card requires choosing a target (drives the targeting UI).
  bool needs_target = 10;
  bool tapped = 11;
  bool summoning_sick = 12;
  // Has haste — so it may attack / tap even while summoning sick.
  bool has_haste = 13;
  // Effective keywords right now (printed ∪ granted ∪ anthem) as stable snake_case ids
  // (`flying`, `first_strike`, `ward:2`, `protection:red`).
  repeated string keywords = 14;
  int32 power = 15;
  int32 toughness = 16;
  // Current loyalty for a planeswalker (0 otherwise).
  int32 loyalty = 17;
  int32 plus_counters = 18;
  int32 marked_damage = 19;
  bool is_commander = 20;
  // Whether this creature is currently goaded (CR 701.38).
  bool goaded = 21;
  // Whether tapping this permanent produces mana.
  bool taps_for_mana = 22;
  // Whether this permanent is prepared (soc/sos prepare DFCs).
  bool prepared = 23;
  // Whether this permanent is phased out (CR 702.26).
  bool phased_out = 24;
  // Whether this permanent is face down (CR 708 — a manifest).
  bool face_down = 25;
  // Host this Aura/Equipment is attached to, if any.
  optional uint32 attached_to = 26;
  // Live sourced modifiers for Alt-inspect (grouped by source card def name).
  repeated ModifierSourceView modifiers = 27;
}

// One entry on the stack, for the stack panel. Bottom-first in `VisibleState.stack`.
message StackObjectView {
  // "spell" or "ability".
  string kind = 1;
  // The spell's stack-object id, or the ability's source permanent.
  uint32 source = 2;
  uint32 controller = 3;
  // A human-readable label (the spell's name, or a description of the ability's effect).
  string label = 4;
  // The chosen target, if any.
  optional WireTarget target = 5;
}

// One labelled item offered by a pending choice (a legal target, or a blocker to assign damage
// to). The `label` is the object's name, so the prompt UI needn't join against the object list.
message ChoiceItem {
  // The object being chosen. Ignored when `player` is set — player-target choices name a seat
  // instead of a battlefield object.
  uint32 id = 1;
  string label = 2;
  optional uint32 player = 3;
  // Scryfall Printing UUID for card art. Empty for player seats and face-down / redacted items.
  string print = 4;
}

// One printed mode of a modal spell.
message ModeView {
  // A human-readable description of the mode's effect.
  string label = 1;
  // The targets legal for *this mode* right now. Empty when the mode takes no target — and
  // also when it takes one but none is legal, which is why `needs_target` is separate.
  repeated WireTarget targets = 2;
  bool needs_target = 3;
}

// A modal spell's printed modes and how many of them the caster picks (CR 700.2).
message ModalView {
  // The minimum number of distinct modes to choose.
  uint32 choose = 1;
  // The maximum. Equal to `choose` for a plain "choose one"/"choose two"; larger when the card
  // offers a range.
  uint32 choose_max = 2;
  // The printed modes, in printed order. A mode's index is its position here.
  repeated ModeView modes = 3;
}

// One action the viewer may take right now (`Game::legal_actions`, filtered to their own seat),
// for the client's sectioned action bar. `id` is what a `take_action` intent sends back.
message ActionView {
  uint64 id = 1;
  string kind = 2;
  // The card (play_land/cast) or ability source (activate); absent for a combat declaration.
  optional uint32 object = 3;
  // The activated ability's index on `object`; set only for `kind == "activate"`.
  optional uint32 ability_index = 4;
  // Section bucket: "hand" | "battlefield" | "command" | "graveyard" | "exile" | "combat".
  string section = 5;
  // Card name (play_land/cast) or ability label (activate/combat).
  string label = 6;
  bool needs_target = 7;
  // The targets legal for this action right now.
  repeated WireTarget targets = 8;
  // Set when this is a cast of a modal spell ("choose one —").
  optional ModalView modal = 9;
  // The creatures that may pay this action's "Sacrifice a creature" activation cost, when it
  // has one. Absent when it has no such cost; present-and-empty when it has one and nothing
  // can pay it.
  optional ObjectIdList sacrifice_choices = 10;
  // Hand cards that may pay this cast's additional discard cost. Absent when the cast has no
  // such cost; present-and-empty when it needs one and the hand can't pay.
  optional ObjectIdList discard_choices = 11;
  // Exact number of hand cards to discard when `discard_choices` is set; `0` when it is not.
  uint32 discard_count = 12;
  // Own graveyard cards that may pay delve or escape exile for this cast. Absent when neither
  // applies; present-and-empty when escape needs exile and the graveyard can't pay.
  optional ObjectIdList graveyard_exile_choices = 13;
  // Inclusive minimum cards to exile from the graveyard (0 for delve; escape's exact N).
  uint32 graveyard_exile_min = 14;
  // Inclusive maximum cards to exile from the graveyard.
  uint32 graveyard_exile_max = 15;
  // Whether this cast asks for `{X}` in the mana cost being paid.
  bool has_x = 16;
  // Battlefield object ids `Game::plan_auto_taps` would tap to pay this action's mana.
  repeated uint32 auto_tap = 17;
  // Creatures that must be declared as attackers for this `declare_attackers` action to be
  // legal (goad "attacks if able", CR 701.38a), each with a suggested legal defender.
  repeated WireAttack required_attacks = 18;
  uint32 min_x = 19;
  uint32 max_x = 20;
  // Mana cost being paid for preview (printed / flashback / back face / activation).
  // Absent when has_x is false.
  optional WireCost x_cost = 21;
}

// The current combat state a client renders: who's attacking and the declared blocks.
message CombatView {
  // Each attacker with the player it's attacking, so clients draw the right arrow and each
  // defender sees who's coming.
  repeated WireAttack attackers = 1;
  repeated WireBlock blocks = 2;
  // The active player has already confirmed their attack declaration this combat (including
  // an empty one).
  bool attackers_declared = 3;
  // Seats that have already confirmed their block declaration this combat (including empty).
  repeated uint32 blockers_declared = 4;
}

// A summary of the decision the engine is blocked on, if any.
message PendingChoiceView {
  oneof choice {
    PendingChoiceViewOrderTriggers order_triggers = 1;
    PendingChoiceViewChooseTarget choose_target = 2;
    PendingChoiceViewChooseSpellTargets choose_spell_targets = 3;
    PendingChoiceViewChooseTargetPlayers choose_target_players = 4;
    PendingChoiceViewMayYesNo may_yes_no = 5;
    PendingChoiceViewPayCost pay_cost = 6;
    PendingChoiceViewPayOrCounter pay_or_counter = 7;
    PendingChoiceViewPayEchoOrSacrifice pay_echo_or_sacrifice = 8;
    PendingChoiceViewAssignCombatDamage assign_combat_damage = 9;
    PendingChoiceViewDivideSpellDamage divide_spell_damage = 10;
    PendingChoiceViewDivideCounters divide_counters = 11;
    PendingChoiceViewScry scry = 12;
    PendingChoiceViewSurveil surveil = 13;
    PendingChoiceViewSearchLibrary search_library = 14;
    PendingChoiceViewSelectFromTop select_from_top = 15;
    PendingChoiceViewDistributeTop distribute_top = 16;
    PendingChoiceViewShuffleFromGraveyard shuffle_from_graveyard = 17;
    PendingChoiceViewSacrificeEdict sacrifice_edict = 18;
    PendingChoiceViewProliferate proliferate = 19;
    PendingChoiceViewPhaseOut phase_out = 20;
    PendingChoiceViewChooseAbilityTargets choose_ability_targets = 21;
    PendingChoiceViewMaySacrifice may_sacrifice = 22;
    PendingChoiceViewChooseOwnSacrifices choose_own_sacrifices = 23;
    PendingChoiceViewDevour devour = 24;
    PendingChoiceViewExileFromGraveyard exile_from_graveyard = 25;
    PendingChoiceViewCasterKeepPermanents caster_keep_permanents = 26;
    PendingChoiceViewChooseCounterTargetForPlayer choose_counter_target_for_player = 27;
    PendingChoiceViewMayReturnFromGraveyard may_return_from_graveyard = 28;
    PendingChoiceViewMayDiscard may_discard = 29;
    PendingChoiceViewDiscard discard = 30;
    PendingChoiceViewPutLandFromHand put_land_from_hand = 31;
    PendingChoiceViewChooseExiledWithCard choose_exiled_with_card = 32;
    PendingChoiceViewChooseExiledWithCardToCast choose_exiled_with_card_to_cast = 33;
    PendingChoiceViewChooseExiledDigToCastFree choose_exiled_dig_to_cast_free = 34;
    PendingChoiceViewDanceExileMore dance_exile_more = 35;
    PendingChoiceViewOpponentChoosesPile opponent_chooses_pile = 36;
    PendingChoiceViewOpponentChoosesExiledNonland opponent_chooses_exiled_nonland = 37;
    PendingChoiceViewChooseExiledToCastFree choose_exiled_to_cast_free = 38;
    PendingChoiceViewRevealedCardToBattlefieldOrHand revealed_card_to_battlefield_or_hand = 39;
    PendingChoiceViewChooseMode choose_mode = 40;
    PendingChoiceViewChooseTriggerModes choose_trigger_modes = 41;
    PendingChoiceViewChooseManaColor choose_mana_color = 42;
    PendingChoiceViewChooseCreatureType choose_creature_type = 43;
    PendingChoiceViewChooseColor choose_color = 44;
    PendingChoiceViewChooseCopyTarget choose_copy_target = 45;
    PendingChoiceViewChooseAttachHost choose_attach_host = 46;
    PendingChoiceViewDeclineUntap decline_untap = 47;
    PendingChoiceViewPayOrControllerDraws pay_or_controller_draws = 48;
    PendingChoiceViewChooseCounteredSpellDestination choose_countered_spell_destination = 49;
    PendingChoiceViewSacrificeUnlessPay sacrifice_unless_pay = 50;
    PendingChoiceViewSacrificeUnlessReturnLand sacrifice_unless_return_land = 51;
    PendingChoiceViewCastCreatureFaceDown cast_creature_face_down = 52;
    PendingChoiceViewChooseSplittingOpponent choose_splitting_opponent = 53;
    PendingChoiceViewPartitionRevealed partition_revealed = 54;
    PendingChoiceViewChoosePileForHand choose_pile_for_hand = 55;
    PendingChoiceViewChooseDredge choose_dredge = 56;
    PendingChoiceViewPayRecoverOrExile pay_recover_or_exile = 57;
    PendingChoiceViewPutCreatureFromHand put_creature_from_hand = 58;
    PendingChoiceViewChooseActivationCostTargets choose_activation_cost_targets = 59;
    PendingChoiceViewPutFromHandOnTop put_from_hand_on_top = 60;
    PendingChoiceViewOpponentChoosesRevealedToGraveyard opponent_chooses_revealed_to_graveyard = 61;
    PendingChoiceViewPayCumulativeUpkeepOrSacrifice pay_cumulative_upkeep_or_sacrifice = 62;
    PendingChoiceViewMayDrawUpTo may_draw_up_to = 63;
    PendingChoiceViewTradeSecretsCasterDraw trade_secrets_caster_draw = 64;
    PendingChoiceViewTradeSecretsRepeat trade_secrets_repeat = 65;
  }
}

// How many items must be permuted, and a label per item so the player can tell them apart.
message PendingChoiceViewOrderTriggers {
  uint32 player = 1;
  uint32 source = 2;
  uint32 count = 3;
  repeated string labels = 4;
}

// Legal targets to choose among. `label` is the effect being aimed; `source` is the permanent
// or spell it comes from. `optional` ("up to one" — Killian, Decisive Mentor) lets the player
// submit no target instead of one of `items`. `max` (Numot, the Devastator's "destroy up to two
// target lands") is how many of `items` may be chosen at once; `1` for the ubiquitous
// single-target case.
message PendingChoiceViewChooseTarget {
  uint32 player = 1;
  uint32 source = 2;
  string label = 3;
  repeated ChoiceItem items = 4;
  bool optional = 5;
  uint32 max = 6;
}

// A multi-target spell's targets to choose (CR 601.2c): between `min` and `max` distinct
// `items` for the `spell` on the stack. `label` is the spell's name.
message PendingChoiceViewChooseSpellTargets {
  uint32 player = 1;
  uint32 spell = 2;
  string label = 3;
  uint32 min = 4;
  uint32 max = 5;
  repeated ChoiceItem items = 6;
}

// "Any number of target players" to choose for a targeted edict (CR 601.2c/608.2b — Priest of
// Forgotten Gods): between `min` (0) and `max` distinct `items` (players). `label` is the
// edict source's name.
message PendingChoiceViewChooseTargetPlayers {
  uint32 player = 1;
  uint32 source = 2;
  string label = 3;
  uint32 min = 4;
  uint32 max = 5;
  repeated ChoiceItem items = 6;
}

// Optional "you may" trigger — `label` is the effect so the client can name what accepting
// does (mirrors `PayCost`).
message PendingChoiceViewMayYesNo {
  uint32 player = 1;
  uint32 source = 2;
  string label = 3;
}

// A may-draw-up-to count choice (Arcane Denial's "may draw up to two cards"): this player chooses
// any number 0..=max of cards to draw. Reveals only the maximum, never hand or library contents.
message PendingChoiceViewMayDrawUpTo {
  uint32 player = 1;
  uint32 max = 2;
}

// Trade Secrets' declinable draw: this player (the caster), after `opponent` drew two
// mandatorily, chooses any number 0..=max of cards to draw.
message PendingChoiceViewTradeSecretsCasterDraw {
  uint32 player = 1;
  uint32 max = 2;
  uint32 opponent = 3;
}

// Trade Secrets' repeat-or-stop pause: this player (the target opponent) may run the whole
// process (the mandatory two-card draw, then `caster`'s declinable draw) again, or stop.
// Answered by the yes/no AnswerMay.
message PendingChoiceViewTradeSecretsRepeat {
  uint32 player = 1;
  uint32 caster = 2;
}

// The cost to accept an optional paid trigger (Trudge Garden's "you may pay {2}"), plus the
// effect label so the client can say what paying does.
message PendingChoiceViewPayCost {
  uint32 player = 1;
  uint32 source = 2;
  WireCost cost = 3;
  // Short English for the paid effect — e.g. "Create 1 Fungus Beast token(s)".
  string label = 4;
}

// Pay `cost` to save `spell` from being countered, or decline and let it be countered (CR
// 701.5c "unless its controller pays" — the mirror image of `PayCost`).
message PendingChoiceViewPayOrCounter {
  uint32 player = 1;
  uint32 spell = 2;
  WireCost cost = 3;
}

// Pay `cost` (Echo) to keep `source`, or decline and sacrifice it (CR 702.31 — the
// permanent-scoped twin of `PayOrCounter`).
message PendingChoiceViewPayEchoOrSacrifice {
  uint32 player = 1;
  uint32 source = 2;
  WireCost cost = 3;
}

// Pay `cost` (Recover, CR 702.59) to return `source` from the graveyard to hand, or decline and
// exile it — the graveyard-scoped twin of `PayEchoOrSacrifice`.
message PendingChoiceViewPayRecoverOrExile {
  uint32 player = 1;
  uint32 source = 2;
  WireCost cost = 3;
}

// Pay Cumulative upkeep's non-mana upkeep cost (CR 702.24a — Jotun Grunt): put `count` of
// `items` (every graveyard's cards, public) on the bottom of a single owner's library, or
// decline (empty answer) and sacrifice `source` instead.
message PendingChoiceViewPayCumulativeUpkeepOrSacrifice {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
  uint32 count = 4;
}

// Blockers to divide the attacker's damage among.
message PendingChoiceViewAssignCombatDamage {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// Targets to divide a divided-damage spell's total among (CR 601.2d).
message PendingChoiceViewDivideSpellDamage {
  uint32 player = 1;
  uint32 spell = 2;
  repeated ChoiceItem items = 3;
  int32 total = 4;
}

// Targets to divide a divided-counters spell's total among (CR 601.2d — Grove's Bounty).
message PendingChoiceViewDivideCounters {
  uint32 player = 1;
  uint32 spell = 2;
  repeated ChoiceItem items = 3;
  int32 total = 4;
}

// The looked-at cards, top of library. Private to the scrying player.
message PendingChoiceViewScry {
  uint32 player = 1;
  repeated ChoiceItem items = 2;
}

// The looked-at cards, top of library. Private to the surveilling player.
message PendingChoiceViewSurveil {
  uint32 player = 1;
  repeated ChoiceItem items = 2;
}

// The matching library cards found. Private to the searching player.
message PendingChoiceViewSearchLibrary {
  uint32 player = 1;
  repeated ChoiceItem items = 2;
}

// The looked-at top cards; the player may select up to `up_to` into a zone. Private to them.
message PendingChoiceViewSelectFromTop {
  uint32 player = 1;
  uint32 up_to = 2;
  repeated ChoiceItem items = 3;
}

// The looked-at top cards; the player must route `to_hand`/`to_bottom`/`to_exile_may_play` of
// them into their respective slots. Private to them.
message PendingChoiceViewDistributeTop {
  uint32 player = 1;
  uint32 to_hand = 2;
  uint32 to_bottom = 3;
  uint32 to_exile_may_play = 4;
  repeated ChoiceItem items = 5;
}

// `owner`'s graveyard cards (`items`, public — graveyard-zone); `player` may shuffle up to
// `max` (`0` = unbounded) of them into `owner`'s library. `owner` differs from `player` when
// the ability targeted a player.
message PendingChoiceViewShuffleFromGraveyard {
  uint32 player = 1;
  uint32 owner = 2;
  uint32 source = 3;
  uint32 max = 4;
  repeated ChoiceItem items = 5;
}

// Permanents this player may choose to sacrifice.
message PendingChoiceViewSacrificeEdict {
  uint32 player = 1;
  uint32 source = 2;
  // When true, the player keeps one permanent and sacrifices all others.
  bool keep_one = 3;
  repeated ChoiceItem items = 4;
}

// Every counter-bearing permanent on the battlefield; this player may choose any number
// (including none) to proliferate (CR 701.27).
message PendingChoiceViewProliferate {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// The other creatures this player controls; they may choose any number (including none) to
// phase out (CR 702.26 — Guardian of Faith). Answered like `Proliferate` (any subset).
message PendingChoiceViewPhaseOut {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// A triggered ability's second independent target clause (CR 603.3d — Kinetic Ooze's X≥10
// "double ... any number of other target creatures"), chosen as the trigger goes on the stack:
// between `min` and `max` distinct `items` for the ability from `source`. `label` is the
// effect being aimed. Answered by `ChooseTargets`, like `ChooseSpellTargets`.
message PendingChoiceViewChooseAbilityTargets {
  uint32 player = 1;
  uint32 source = 2;
  string label = 3;
  uint32 min = 4;
  uint32 max = 5;
  repeated ChoiceItem items = 6;
}

// An activated ability's own targeted exile cost (CR 601.2c/602.2b — Spurnmage Advocate's
// "Exile two target cards from an opponent's graveyard"), named after every other cost is
// already paid: exactly `count` of `items` (cards in an opponent's graveyard). Answered by
// `ChooseTargets`, like `ChooseAbilityTargets` — but a paid cost, not the ability's own
// stack-bound target clause.
message PendingChoiceViewChooseActivationCostTargets {
  uint32 player = 1;
  uint32 source = 2;
  uint32 count = 3;
  repeated ChoiceItem items = 4;
}

// This player may sacrifice one of `items` (a permanent they control) to gain a rider effect,
// or decline (CR 601.2f-style resolution-time optional cost).
message PendingChoiceViewMaySacrifice {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player must choose exactly `count` of `items` (their own permanents) to sacrifice — a
// forced sacrifice they direct (CR 701.16a — Lotus Field's ETB, Smothering Abomination's
// upkeep). Unlike `MaySacrifice`, declining isn't legal.
message PendingChoiceViewChooseOwnSacrifices {
  uint32 player = 1;
  uint32 source = 2;
  uint32 count = 3;
  repeated ChoiceItem items = 4;
}

// This player may sacrifice any subset of `items` (the other creatures they control) as a
// Devour N creature (`source`) enters; it gains `multiplier × count` +1/+1 counters (CR 702.82
// — Mycoloth, Ribtruss Roaster). An empty selection declines (0 counters).
message PendingChoiceViewDevour {
  uint32 player = 1;
  uint32 source = 2;
  uint32 multiplier = 3;
  repeated ChoiceItem items = 4;
}

// This player must exile one of `items` (a card in their own graveyard) to a multi-player
// fan-out (Augusta, Order Returned). The graveyard is public, so `items` are public.
message PendingChoiceViewExileFromGraveyard {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player (Tragic Arrogance's caster) chooses which of `target_player`'s nonland
// permanents (`items`) to keep — up to one of each type; the rest are sacrificed. Answered
// like the sacrifice choices (naming the kept subset); the answering seat is `player` (the
// caster), not `target_player`.
message PendingChoiceViewCasterKeepPermanents {
  uint32 player = 1;
  uint32 source = 2;
  uint32 target_player = 3;
  repeated ChoiceItem items = 4;
}

// This player (Nils' controller) puts a +1/+1 counter on up to one of `target_player`'s
// creatures (`items`), or declines. Answered like the sacrifice choices (naming the 0-or-1
// chosen creature); the answering seat is `player` (the chooser), not `target_player`.
message PendingChoiceViewChooseCounterTargetForPlayer {
  uint32 player = 1;
  uint32 source = 2;
  uint32 target_player = 3;
  repeated ChoiceItem items = 4;
}

// This player may return one of `items` (a card in their own graveyard) to their hand, or
// decline (CR 601.2f-style resolution-time optional rider — Deadly Brew).
message PendingChoiceViewMayReturnFromGraveyard {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player may discard one of `items` (a card in their own hand, private to them) to gain a
// rider effect, or decline (CR 608.2c-style resolution-time optional sub-action — Quintorius,
// History Chaser's +1).
message PendingChoiceViewMayDiscard {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player must discard `count` cards from their hand (`items`, private to them).
message PendingChoiceViewDiscard {
  uint32 player = 1;
  uint32 count = 2;
  repeated ChoiceItem items = 3;
}

// This player must put `count` cards from their hand (`items`, private to them) on top of
// their library, in an order they choose (Brainstorm) — unlike `PendingChoiceViewDiscard`, the
// answer's order matters (first-named ends up on top).
message PendingChoiceViewPutFromHandOnTop {
  uint32 player = 1;
  uint32 count = 2;
  repeated ChoiceItem items = 3;
}

// This player may put one hand land (`items`, private to them) onto the battlefield, or
// decline.
message PendingChoiceViewPutLandFromHand {
  uint32 player = 1;
  repeated ChoiceItem items = 2;
}

// This player may put one hand creature (`items`, private to them) onto the battlefield (it
// gains haste and is sacrificed at the beginning of the next end step — Cauldron Dance), or
// decline.
message PendingChoiceViewPutCreatureFromHand {
  uint32 player = 1;
  repeated ChoiceItem items = 2;
}

// This player is about to draw and may dredge instead (CR 702.52): `items` are the eligible
// dredgers in their own graveyard. Answering picks one to mill-and-return, or declines to draw
// normally.
message PendingChoiceViewChooseDredge {
  uint32 player = 1;
  repeated ChoiceItem items = 2;
}

// This player may put one card exiled with `source` (`items`, public — exile-zone) into its
// owner's graveyard, or decline.
message PendingChoiceViewChooseExiledWithCard {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player may choose one card exiled with `source` (`items`, public — exile-zone) to grant
// the free-cast permission (CR 118.5), or decline.
message PendingChoiceViewChooseExiledWithCardToCast {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player may choose one card (`items`, public — exile-zone) among a just-exiled dig batch
// to grant the free-cast permission (CR 118.5), or decline. Every other card in the batch goes
// to the bottom of the library once answered.
message PendingChoiceViewChooseExiledDigToCastFree {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player (the caster) may exile another top-of-library card or stop (Dance with
// Calamity). `items` are the cards exiled so far (public — exile-zone), `total_mv` their
// summed mana value, and `budget` the bust threshold. Answered by the yes/no `AnswerMay`.
message PendingChoiceViewDanceExileMore {
  uint32 player = 1;
  uint32 source = 2;
  uint32 total_mv = 3;
  uint32 budget = 4;
  repeated ChoiceItem items = 5;
}

// This player (an **opponent** of the controller) must choose one of two exile piles; the
// chosen pile goes to the controller's graveyard (Abstract Performance). `pile_a`/`pile_b` are
// the piles' cards in order.
message PendingChoiceViewOpponentChoosesPile {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem pile_a = 3;
  repeated ChoiceItem pile_b = 4;
}

// This player (an **opponent** of the controller) must choose one nonland card exiled this way
// (`items`, public — exile-zone); the controller then casts up to two of the others free
// (Plargg and Nassari).
message PendingChoiceViewOpponentChoosesExiledNonland {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player (the controller) may choose up to `count` of `items` (public — exile-zone) to
// grant the free-cast permission (CR 118.5); the rest go to hand or stay exiled per the card
// (Abstract Performance's kept pile, Plargg and Nassari's other exiled cards).
message PendingChoiceViewChooseExiledToCastFree {
  uint32 player = 1;
  uint32 source = 2;
  uint32 count = 3;
  repeated ChoiceItem items = 4;
}

// This player may put `item` (a just-revealed library card, public) onto the battlefield, or
// decline and put it into hand instead.
message PendingChoiceViewRevealedCardToBattlefieldOrHand {
  uint32 player = 1;
  ChoiceItem item = 2;
}

// This player must choose one mode of a "choose one" triggered ability. `labels` describes
// each mode (public card text), one per selectable index.
message PendingChoiceViewChooseMode {
  uint32 player = 1;
  uint32 source = 2;
  repeated string labels = 3;
}

// This player may choose `choose` distinct modes of a modal *triggered* ability (CR 700.2 —
// Shadrix Silverquill's begin-combat "you may choose two"), each with its own target where the
// mode needs one. `optional`: declining (an empty selection) is legal and drops the whole
// ability.
message PendingChoiceViewChooseTriggerModes {
  uint32 player = 1;
  uint32 source = 2;
  uint32 choose = 3;
  bool optional = 4;
  repeated ModeView modes = 5;
}

// This player (a mana ability's controller) must name one color; `amount` mana of that color
// is added to their pool (CR 106.4 "add N mana of any one color" — Lotus Field, Kami of
// Whispered Hopes).
message PendingChoiceViewChooseManaColor {
  uint32 player = 1;
  uint32 source = 2;
  uint32 amount = 3;
}

// This player (an as-enters permanent's controller) must name a creature type for `source` (CR
// 614.12/700.9-style "as ~ enters, choose a creature type" — Patchwork Banner). `options` is
// the pool's known creature-type table.
message PendingChoiceViewChooseCreatureType {
  uint32 player = 1;
  uint32 source = 2;
  repeated string options = 3;
}

// This player (an as-enters permanent's controller) must name a color for `source` (CR
// 614.12/700.9-style "as ~ enters, choose a color" — Flickering Ward). The candidates are the
// fixed five WUBRG colors, so no `options` list is carried.
message PendingChoiceViewChooseColor {
  uint32 player = 1;
  uint32 source = 2;
}

// This player (an entering permanent's controller) may have `source` enter as a copy of one of
// `items` (every other creature on the battlefield, public — CR 706/707.2, Altered Ego, Cursed
// Mirror). Answered with the chosen creature, or a decline (the "you may").
message PendingChoiceViewChooseCopyTarget {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player (the deployed attachment's controller) must choose a host among `items` (the
// eligible battlefield creatures, public) for the Aura or Equipment it just put onto the
// battlefield without casting it. An Aura's host is mandatory. Equipment's host is optional —
// any creature this player controls, and declining leaves it unattached (`optional`).
message PendingChoiceViewChooseAttachHost {
  uint32 player = 1;
  uint32 attachment = 2;
  repeated ChoiceItem items = 3;
  bool optional = 4;
}

// This player (the active player at their untap step) may choose not to untap any of `items` —
// the permanents they control that "may choose not to untap" (CR 502.2 — Rubinia Soulsinger).
// `items` are public battlefield permanents. Answering keeps the chosen subset tapped and
// untaps the rest.
message PendingChoiceViewDeclineUntap {
  uint32 player = 1;
  repeated ChoiceItem items = 2;
}

// The triggering opponent (`player`) may pay `cost` to stop `controller`'s optional draw —
// Rhystic Study's "unless that player pays {1}". Only raised after `controller` accepts the
// preceding `MayYesNo` pause. Paying leaves `controller`'s hand untouched; declining draws them
// a card.
message PendingChoiceViewPayOrControllerDraws {
  uint32 player = 1;
  uint32 controller = 2;
  WireCost cost = 3;
}

// `spell` is already countered (CR 701.5b — Hinder's `countered_dest` rider) — choose the top
// or bottom of its owner's library for it to go to instead of the graveyard.
message PendingChoiceViewChooseCounteredSpellDestination {
  uint32 player = 1;
  uint32 spell = 2;
}

// Pay `cost` to keep `source`, or decline and sacrifice it — a real ETB triggered ability
// (Rupture Spire, CR 603.3b), not Echo, though it shares `PayEchoOrSacrifice`'s shape.
message PendingChoiceViewSacrificeUnlessPay {
  uint32 player = 1;
  uint32 source = 2;
  WireCost cost = 3;
}

// Return one of `items` (a non-Lair land the player controls, public) to its owner's hand to
// keep `source`, or decline and sacrifice it (Treva's Ruins).
message PendingChoiceViewSacrificeUnlessReturnLand {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player may put one hand creature (`items`, private to them — mana value at most the
// paid `{X}`) face down as a 2/2 without paying its mana cost (Illusionary Mask), or decline.
message PendingChoiceViewCastCreatureFaceDown {
  uint32 player = 1;
  repeated ChoiceItem items = 2;
}

// This player (the ability's controller) must choose which opponent makes an "an opponent ..."
// decision on their behalf (Abstract Performance's pile split, Fact or Fiction's partition) —
// `items` are the living opponents (as player-only `ChoiceItem`s), `label` the ability source's
// name. Only raised with two or more opponents alive.
message PendingChoiceViewChooseSplittingOpponent {
  uint32 player = 1;
  uint32 source = 2;
  string label = 3;
  repeated ChoiceItem items = 4;
}

// This player (the opponent `ChooseSplittingOpponent` named) must assign each of `items` (Fact
// or Fiction's five revealed cards, public) to one of two piles: the answer names pile A's
// subset, the rest form pile B. Either pile may be empty.
message PendingChoiceViewPartitionRevealed {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player (an **opponent** of the controller) must choose one of `items` (Murmurs from
// Beyond's three revealed cards, public); the chosen card goes to the controller's graveyard,
// the rest to the controller's hand.
message PendingChoiceViewOpponentChoosesRevealedToGraveyard {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem items = 3;
}

// This player (the controller of Fact or Fiction) picks one of the two piles
// `PartitionRevealed` just made to put into their hand; the other is milled into their
// graveyard.
message PendingChoiceViewChoosePileForHand {
  uint32 player = 1;
  uint32 source = 2;
  repeated ChoiceItem pile_a = 3;
  repeated ChoiceItem pile_b = 4;
}

// The complete view one player is allowed to see: turn state, per-player facts, and the
// objects visible to them (all public zones + their own hand; opponents' hands and all
// libraries are counts only).
message VisibleState {
  uint32 viewer = 1;
  uint32 active_player = 2;
  // Step discriminant; see `engine::Step`.
  uint32 step = 3;
  uint32 priority = 4;
  repeated PlayerView players = 5;
  repeated ObjectView objects = 6;
  // The stack, bottom-first (last entry is the top, which resolves next).
  repeated StackObjectView stack = 7;
  // Declared attackers and blocks this combat (empty outside combat).
  CombatView combat = 8;
  // Whether the current priority holder has a meaningful action (for "you can act" emphasis);
  // the server auto-passes when this is false.
  bool can_act = 9;
  // Whether THIS viewer has yielded ("don't care") to the current stack. Always false for a
  // spectator.
  bool yielded = 10;
  // Whether THIS viewer has turn-yielded (auto-pass until their turn / until they act — ADR
  // 0029). Always false for a spectator.
  bool turn_yielded = 11;
  // Milliseconds until an uncontested stack auto-resolves; `0` when no stack-hold is active.
  uint32 stack_hold_remaining_ms = 12;
  optional PendingChoiceView pending_choice = 13;
  // The viewer's own legal actions right now (empty for a spectator, or anyone else's seat).
  repeated ActionView actions = 14;
  // Whether the game is in the simultaneous pre-game mulligan phase.
  bool mulliganing = 15;
}

