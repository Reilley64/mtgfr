version: v2
clean: true
plugins:
  - local: protoc-gen-es
    out: ../client/lib/wire/generated
    opt:
      - target=ts
      - import_extension=js
  - local: protoc-gen-effect-grpc
    out: ../client/lib/wire/generated
    opt:
      - target=ts
      - import_extension=js
      - errors=grpc-status
