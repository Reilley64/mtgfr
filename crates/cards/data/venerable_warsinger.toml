# Whenever this creature deals combat damage to a player, you may return target creature card
# with mana value X or less from your graveyard to the battlefield, where X is the amount of
# damage this creature dealt to that player.
[[abilities]]
timing = "deals_combat_damage_to_player"
who = "this"
optional = true

# return target creature card with mana value X or less from your graveyard to the battlefield,
# where X is the amount of damage this creature dealt to that player.
[[abilities.effects]]
type = "zone"
mode = "reanimate_to_battlefield"
target = { card_in_graveyard = { whose = "yours", filter = "creature_with_mana_value_at_most_combat_damage" } }
