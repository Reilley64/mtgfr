default_print = "75955b0e-12d6-40ba-aab5-b7b7e2bde121"
otags = ["activated-ability", "cycle-grn-guild-champion", "draw-engine", "enters-in-company", "hand-positive", "repeatable-lifegain", "repeatable-plunder", "sacrifice-outlet-creature", "triggered-ability", "undergrowth"]
oracle = "Undergrowth — When Izoni enters, create a 1/1 black and green Insect creature token for each creature card in your graveyard.\n{B}{G}, Sacrifice another creature: You gain 1 life and draw a card."
set = "grn"
subtypes = ["Elf", "Shaman"]
legendary = true

[cost]
generic = 2
black = 2
green = 2

[kind]
type = "creature"
power = 2
toughness = 3

# Undergrowth — When Izoni enters, create a 1/1 black and green Insect creature token for each
# creature card in your graveyard.
