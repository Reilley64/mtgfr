# Return target card from your graveyard to your hand. If you return a nonland card to your hand this way, Vengeful
# Rebirth deals damage equal to that card's mana value to any target.
# Exile Vengeful Rebirth.
name = "Vengeful Rebirth"
oracle = "Return target card from your graveyard to your hand. If you return a nonland card to your hand this way, Vengeful Rebirth deals damage equal to that card's mana value to any target.\nExile Vengeful Rebirth."
set = "uma"
id = "522297b1-493a-4c62-a82a-3017c44183e8"
default_print = "b03bb160-8113-409a-a130-2b3fdc476e6a"

[cost]
generic = 4
red = 1
green = 1

[kind]
type = "sorcery"

# Return target card from your graveyard to your hand. If you return a nonland card to your hand this way, Vengeful
# Rebirth deals damage equal to that card's mana value to any target.
# Exile Vengeful Rebirth.
[[abilities]]
timing = "spell"

# Return target card from your graveyard to your hand.
[[abilities.effects]]
type = "return_from_graveyard_to_hand"
