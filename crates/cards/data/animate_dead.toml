# Enchant creature card in a graveyard
# When this Aura enters, if it's on the battlefield, it loses "enchant creature card in a graveyard" and gains "enchant
# creature put onto the battlefield with this Aura." Return enchanted creature card to the battlefield under your
# control and attach this Aura to it. When this Aura leaves the battlefield, that creature's controller sacrifices it.
# Enchanted creature gets -1/-0.
name = "Animate Dead"
id = "c0d8fef4-65f4-4769-982d-b397d2b7e977"
default_print = "cc0c2bab-4392-4e7b-9d14-2901f4ffbae8"
otags = ["animate-dead-like", "delayed-trigger", "intervening-if-clause", "meme", "reanimate-creature", "reanimate-from-any", "rules-nightmare", "notorious-templating"]
oracle = "Enchant creature card in a graveyard\nWhen this Aura enters, if it's on the battlefield, it loses \"enchant creature card in a graveyard\" and gains \"enchant creature put onto the battlefield with this Aura.\" Return enchanted creature card to the battlefield under your control and attach this Aura to it. When this Aura leaves the battlefield, that creature's controller sacrifices it.\nEnchanted creature gets -1/-0."
set = "soc"
subtypes = ["Aura"]
enchant_graveyard = true

[cost]
generic = 1
black = 1

[kind]
type = "aura"

# When this Aura enters, if it's on the battlefield, it loses "enchant creature card in a
# graveyard" and gains "enchant creature put onto the battlefield with this Aura." Return
# enchanted creature card to the battlefield under your control and attach this Aura to it.
[[abilities]]
timing = "etb"

# Return enchanted creature card to the battlefield under your control
[[abilities.effects]]
type = "zone"
mode = "reanimate_to_battlefield"
target = "this_auras_graveyard_target"

# attach this Aura to it
[[abilities.effects]]
type = "zone"
mode = "attach_self_to_reanimated"

# Enchanted creature gets -1/-0.
[[abilities]]
timing = "static"

# Enchanted creature gets -1/-0.
[[abilities.effects]]
type = "static"
mode = "grant_to_attached"
power = -1
toughness = 0

# When this Aura leaves the battlefield, that creature's controller sacrifices it.
[[abilities]]
timing = "this_leaves_battlefield"

# that creature's controller sacrifices it
[[abilities.effects]]
type = "sacrifice"
mode = "enchanted_creature"
