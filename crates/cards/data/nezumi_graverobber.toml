# If no cards are in that graveyard, flip this creature.
[[abilities.effects]]
type = "conditional"
condition = { type = "target_card_owner_graveyard_empty" }
then = [{ type = "misc", mode = "flip_source" }]

[back]
name = "Nighteyes the Desecrator"
