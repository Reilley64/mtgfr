# Commanders you control have hexproof.
# ponytail: the pool's only commander-scoped anthem targets creatures — every pool commander is
# a creature, so a creature-scoped anthem stands in for "commanders you control have hexproof"
# even though the real ability isn't creature-restricted.
[[abilities]]
timing = "static"

# Commanders you control have hexproof.
[[abilities.effects]]
type = "anthem_static"
keywords = ["hexproof"]
commander_only = true
