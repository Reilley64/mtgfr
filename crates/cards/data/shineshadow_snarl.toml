# As this land enters, you may reveal a Plains or Swamp card from your hand. If you don't, this land enters tapped.
# {T}: Add {W} or {B}.
# Shineshadow Snarl (soc): "As this land enters, you may reveal a Plains or Swamp card from your
# hand. If you don't, this land enters tapped. {T}: Add {W} or {B}."
# ponytail: the reveal is modeled as an automatic hand scan (see Condition::HandHasLandWithSubtype)
# rather than a real choice — revealing is strictly better with no downside, so there's nothing to
# decide.
name = "Shineshadow Snarl"
otags = ["activated-ability", "alliteration", "cycle-stx-reveal-land", "synergy-plains", "synergy-swamp"]
oracle = "As this land enters, you may reveal a Plains or Swamp card from your hand. If you don't, this land enters tapped.\n{T}: Add {W} or {B}."
set = "soc"

[kind]
type = "land"
produces = ["white", "black"]

[enters_tapped_unless]
type = "hand_has_land_with_subtype"
subtypes = ["Plains", "Swamp"]
