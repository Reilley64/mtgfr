# Creature tokens you control have haste.
# At the beginning of combat on your turn, create a 2/1 blue Phyrexian Myr artifact creature token. Then you may choose
# a token you control. If you do, each other token you control becomes a copy of that token.
# Brudiclad, Telchor Engineer (SOC): {4}{U}{R} 4/4 Legendary Artifact Creature.
name = "Brudiclad, Telchor Engineer"
id = "a7ac5d98-805e-4212-be94-333a0c0c44a7"
default_print = "d24bf1df-5087-4ad6-a1aa-4eda2340cd8b"
otags = ["copy-token", "cycle-2xm-r-two-color", "cycle-c18-alt-commander", "faux-targeting", "gives-haste", "keyword-anthem", "repeatable-artifact-tokens", "repeatable-creature-tokens", "shapesharing", "synergy-token-creature", "triggered-ability", "type-addition-phyrexian"]
oracle = "Creature tokens you control have haste.\nAt the beginning of combat on your turn, create a 2/1 blue Phyrexian Myr artifact creature token. Then you may choose a token you control. If you do, each other token you control becomes a copy of that token."
set = "soc"
subtypes = ["Phyrexian", "Artificer"]
legendary = true

[cost]
generic = 4
blue = 1
red = 1

[kind]
type = "creature"
power = 4
toughness = 4
also = ["artifact"]

# Creature tokens you control have haste.
[[abilities]]
timing = "static"

# Creature tokens you control have haste.
[[abilities.effects]]
type = "anthem_static"
tokens_only = true
keywords = ["haste"]

# At the beginning of combat on your turn, create a 2/1 blue Phyrexian Myr artifact creature
# token. Then you may choose a token you control. If you do, each other token you control becomes a
# copy of that token.
[[abilities]]
timing = "begin_combat"

# create a 2/1 blue Phyrexian Myr artifact creature token
[[abilities.effects]]
type = "create_token"
count = 1

[abilities.effects.token]
name = "Myr"
colors = ["blue"]
subtypes = ["Phyrexian", "Myr"]

[abilities.effects.token.kind]
type = "creature"
power = 2
toughness = 1
also = ["artifact"]

# Then you may choose a token you control. If you do, each other token you control becomes a copy
# of that token.
[[abilities.effects]]
type = "each_other_token_becomes_copy_of_chosen"
