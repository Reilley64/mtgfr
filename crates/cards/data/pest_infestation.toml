# Destroy up to X target artifacts and/or enchantments. Create twice X 1/1 black and green Pest creature tokens with
# "When this token dies, you gain 1 life."
# Pest Infestation {X}{X}{G} — "Destroy up to X target artifacts and/or enchantments. Create twice
# X 1/1 black and green Pest creature tokens with 'When this token dies, you gain 1 life.'"
name = "Pest Infestation"
id = "1b704798-0c69-4c18-ac7e-42933ce90028"
default_print = "c9b8626d-d3d8-4460-9adf-112f48f173f6"
otags = ["disenchant-naturalize", "lifegain", "multi-removal", "multiple-bodies", "multiple-targets", "out-of-color-token", "removal-destroy", "single-target-instant-sorcery", "spot-removal", "triggered-ability"]
oracle = "Destroy up to X target artifacts and/or enchantments. Create twice X 1/1 black and green Pest creature tokens with \"When this token dies, you gain 1 life.\""
set = "soc"

[cost]
green = 1
x = 2

[kind]
type = "sorcery"

# Destroy up to X target artifacts and/or enchantments. A separate spell-timed ability from the
# token creation below (not a `Sequence` step): the two clauses aren't per-target-linked like
# Curse of the Swine's exile-then-Boar, so the token half must resolve exactly once regardless of
# how many artifacts/enchantments the destroy half actually hits, not once per destroyed target.
[[abilities]]
timing = "spell"

# Destroy up to X target artifacts and/or enchantments.
[[abilities.effects]]
type = "destroy_target"
target = { permanent = { types = ["artifact", "enchantment"] } }
count = { min = 0, max = 0, x_scaled = true }

# Create twice X 1/1 black and green Pest creature tokens with "When this token dies, you gain 1
# life."
[[abilities]]
timing = "spell"

# Create twice X 1/1 black and green Pest creature tokens with "When this token dies, you gain 1
# life."
[[abilities.effects]]
type = "create_token"
token = "37c4adc8-7455-4725-95fb-169a8b0254e5"
count = "twice_x"

