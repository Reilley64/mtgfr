# {T}: Add {C}{C}. When you next cast a spell with {X} in its mana cost this turn, you draw a card and gain half X life,
# rounded down.
# Brass Infiniscope (SOC): {4} Artifact.
name = "Brass Infiniscope"
otags = ["activated-ability", "adds-multiple-mana", "cast-trigger-you", "delayed-trigger", "draw-engine", "refund", "repeatable-lifegain", "repeatable-pure-draw", "utility-mana-rock", "x-cost-matters"]
oracle = "{T}: Add {C}{C}. When you next cast a spell with {X} in its mana cost this turn, you draw a card and gain half X life, rounded down."
set = "soc"

[cost]
generic = 4

[kind]
type = "artifact"

# {T}: Add {C}{C}. When you next cast a spell with {X} in its mana cost this turn, you draw a
# card and gain half X life, rounded down.
[[abilities]]
timing = "activated"
taps_self = true

# Add {C}{C}.
[[abilities.effects]]
type = "add_mana"
mana = ["colorless", "colorless"]

# When you next cast a spell with {X} in its mana cost this turn, you draw a card and gain half
# X life, rounded down.
[[abilities.effects]]
type = "schedule_next_cast_trigger"
filter = "has_x"
then = [
        { type = "draw_cards", count = 1 },
        { type = "gain_life", amount = "half_x_rounded_down" },
    ]
