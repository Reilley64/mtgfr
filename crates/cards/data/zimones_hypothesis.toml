# You may put a +1/+1 counter on a creature. Then choose odd or even. Return each creature with power of the chosen
# quality to its owner's hand. (Zero is even.)
# Zimone's Hypothesis {3}{U}{U} — an instant (soc). Oracle:
#   "You may put a +1/+1 counter on a creature. Then choose odd or even. Return each creature with
#    power of the chosen quality to its owner's hand. (Zero is even.)"
# ponytail: "choose odd or even" is modeled as a modal "choose one" (`modal = true`) between the
# two ReturnAllToHand filters, and the "may put a +1/+1 counter on a creature" primer rides along
# as each mode's own up-to-one `put_counters` target — both the counter target and the parity are
# picked at cast, instead of the printed order (put counter, then choose parity). Behaviorally
# identical for the pool: the mass bounce still reads post-counter power at resolution, and no
# player can respond between the two picks.
name = "Zimone's Hypothesis"
otags = ["even-odd-matters", "gives-pp-counters", "namesake-spell", "removal-bounce", "removal-creature", "sweeper-one-sided"]
oracle = "You may put a +1/+1 counter on a creature. Then choose odd or even. Return each creature with power of the chosen quality to its owner's hand. (Zero is even.)"
set = "soc"
modal = true

[cost]
generic = 3
blue = 2

[kind]
type = "instant"

# You may put a +1/+1 counter on a creature. Then choose odd or even. Return each creature with
# power of the chosen quality to its owner's hand.
# Mode 0 — odd.
[[abilities]]
timing = "spell"

# You may put a +1/+1 counter on a creature.
[[abilities.effects]]
type = "put_counters"
count = 1
target = "creature"
targets = { min = 0, max = 1 }

# Return each creature with power of the chosen quality to its owner's hand.
[[abilities.effects]]
type = "return_all_to_hand"
filter = { types = "creature", power_parity = "odd" }

# You may put a +1/+1 counter on a creature. Then choose odd or even. Return each creature with
# power of the chosen quality to its owner's hand.
# Mode 1 — even.
[[abilities]]
timing = "spell"

# You may put a +1/+1 counter on a creature.
[[abilities.effects]]
type = "put_counters"
count = 1
target = "creature"
targets = { min = 0, max = 1 }

# Return each creature with power of the chosen quality to its owner's hand.
[[abilities.effects]]
type = "return_all_to_hand"
filter = { types = "creature", power_parity = "even" }
