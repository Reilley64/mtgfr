# This enchantment enters with X charge counters on it.
# Remove a charge counter from this enchantment: Add one mana of any color. Activate only once each turn.
# At the beginning of your upkeep, if this enchantment has no charge counters on it, return it to its owner's hand.
# Mana Bloom (soc): "{X}{G} Enchantment.
#   This enchantment enters with X charge counters on it.
#   Remove a charge counter from this enchantment: Add one mana of any color. Activate only once
#   each turn.
#   At the beginning of your upkeep, if this enchantment has no charge counters on it, return it to
#   its owner's hand."
name = "Mana Bloom"
id = "7c699180-d18e-4599-acd1-27b951d82136"
default_print = "03a40bf7-5eb9-4b36-9388-48b482a6fcf2"
otags = ["activated-ability", "bounce-self", "counter-fuel-charge", "intervening-if-clause", "mana-storage", "ramp"]
oracle = "This enchantment enters with X charge counters on it.\nRemove a charge counter from this enchantment: Add one mana of any color. Activate only once each turn.\nAt the beginning of your upkeep, if this enchantment has no charge counters on it, return it to its owner's hand."
set = "soc"

[cost]
x = true
green = 1

[kind]
type = "enchantment"

# Enters with X charge counters.
[[abilities]]
timing = "static"

# This enchantment enters with X charge counters on it.
[[abilities.effects]]
type = "static"
mode = "enters_with_counters"
count = "x"
kind = "charge"

# Remove a charge counter from this enchantment: Add one mana of any color. Activate only once
# each turn.
[[abilities]]
timing = "activated"
remove_counters = 1
remove_counters_kind = "charge"
once_each_turn = true

# Add one mana of any color.
[[abilities.effects]]
type = "mana"
mode = "add"
mana = ["any"]

# At the beginning of your upkeep, if this enchantment has no charge counters on it, return it to
# its owner's hand.
[[abilities]]
timing = "upkeep"
condition = { type = "source_has_no_counters_of_kind", kind = "charge" }

# return it to its owner's hand.
[[abilities.effects]]
type = "zone"
mode = "return_this_to_hand"
