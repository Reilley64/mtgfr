# [Lorehold Archivist]
# First strike
# At the beginning of your upkeep, if there are three or more artifact and/or creature cards in your graveyard, this
# creature becomes prepared. (While it's prepared, you may cast a copy of its spell. Doing so unprepares it.)
# [Restore Relic]
# Exile target artifact or creature card from your graveyard. Create a token that's a copy of it.
