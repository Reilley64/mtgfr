# As this land enters, you may reveal an Island or Mountain card from your hand. If you don't, this land enters tapped.
# {T}: Add {U} or {R}.
# Frostboil Snarl: Land. "As this land enters, you may reveal an Island or Mountain card from your
# hand. If you don't, this land enters tapped. {T}: Add {U} or {R}."
# ponytail: the reveal is modeled as an automatic hand scan (see Condition::HandHasLandWithSubtype)
# rather than a real choice — revealing is strictly better with no downside, so there's nothing to
# decide.
name = "Frostboil Snarl"
otags = ["activated-ability", "cycle-stx-reveal-land", "synergy-island", "synergy-mountain"]
oracle = "As this land enters, you may reveal an Island or Mountain card from your hand. If you don't, this land enters tapped.\n{T}: Add {U} or {R}."
set = "msc"

[kind]
type = "land"
produces = ["blue", "red"]

[enters_tapped_unless]
type = "hand_has_land_with_subtype"
subtypes = ["Island", "Mountain"]
