# Whenever you cast an instant or sorcery spell, create a 1/1 blue and red Elemental creature token. If that spell's
# mana value is 5 or greater, create three of those tokens instead.
# Prismari Pianist {1}{R}{R} — 2/1 Djinn Bard.
name = "Prismari Pianist"
id = "f58117e4-ba85-41b8-8fd5-4245716a84dc"
default_print = "7e3e5990-ad48-4be2-af8a-4ff77177758d"
otags = ["alliteration", "cast-trigger-you", "mana-value-matters", "self-replacement-effect", "young-pyromancer-ability"]
oracle = "Whenever you cast an instant or sorcery spell, create a 1/1 blue and red Elemental creature token. If that spell's mana value is 5 or greater, create three of those tokens instead."
set = "soc"
subtypes = ["Djinn", "Bard"]

[cost]
generic = 1
red = 2

[kind]
type = "creature"
power = 2
toughness = 1

# Whenever you cast an instant or sorcery spell, create a 1/1 blue and red Elemental creature token.
# If that spell's mana value is 5 or greater, create three of those tokens instead.
[[abilities]]
timing = "cast_spell"
spell_filter = "instant_or_sorcery"

# create a 1/1 blue and red Elemental creature token.
[[abilities.effects]]
type = "create_token"
count = 1
token = { name = "Elemental", id = "e1cab9f5-a094-4df4-9094-71bebf91956f", default_print = "222b8394-20e7-4808-8eec-cb048f548055", power = 1, toughness = 1, colors = ["blue", "red"], subtypes = ["Elemental"] }

# If that spell's mana value is 5 or greater, create three of those tokens instead.
[[abilities.effects]]
type = "conditional"
condition = { type = "triggering_spell_mana_value_at_least", at_least = 5 }
then = [
        { type = "create_token", count = 2, token = { name = "Elemental", id = "e1cab9f5-a094-4df4-9094-71bebf91956f", default_print = "222b8394-20e7-4808-8eec-cb048f548055", power = 1, toughness = 1, colors = ["blue", "red"], subtypes = ["Elemental"] } },
    ]
