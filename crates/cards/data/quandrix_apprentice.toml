# Magecraft — Whenever you cast or copy an instant or sorcery spell, look at the top three cards of your library. You
# may reveal a land card from among them and put that card into your hand. Put the rest on the bottom of your library in
# any order.
# Quandrix Apprentice (soc). Real oracle text:
#   "Magecraft — Whenever you cast or copy an instant or sorcery spell, look at the top three cards
#    of your library. You may reveal a land card from among them and put that card into your hand.
#    Put the rest on the bottom of your library in any order."
# ponytail: "put the rest on the bottom of your library in any order" — the bottom of the library
# is hidden, so the order among bottomed cards is unobservable; a fixed order stands in for it.
name = "Quandrix Apprentice"
otags = ["bear-with-set-s-mechanic", "cycle-stx-apprentice", "impulse-land", "magecraft", "repeatable-impulse"]
oracle = "Magecraft — Whenever you cast or copy an instant or sorcery spell, look at the top three cards of your library. You may reveal a land card from among them and put that card into your hand. Put the rest on the bottom of your library in any order."
set = "soc"
subtypes = ["Human", "Wizard"]

[cost]
green = 1
blue = 1

[kind]
type = "creature"
power = 2
toughness = 2

# Magecraft — Whenever you cast or copy an instant or sorcery spell, look at the top three cards of
# your library. You may reveal a land card from among them and put that card into your hand. Put the
# rest on the bottom of your library in any order.
[[abilities]]
timing = "magecraft"

# look at the top three cards of your library. You may reveal a land card from among them and put
# that card into your hand. Put the rest on the bottom of your library in any order.
[[abilities.effects]]
type = "look_at_top"
count = 3
filter = "land"
up_to = 1
dest = "hand"
rest = "bottom"
