# {T}: Choose a color. Add one mana of that color for each charge counter on this artifact.
# {T}: Add one mana of any color for each charge counter on this artifact.
[[abilities]]
timing = "activated"
taps_self = true

# Add one mana of that color for each charge counter on this artifact.
[[abilities.effects]]
type = "add_mana"
mana = ["any"]
repeat = { per_counter_of_kind = "charge" }
