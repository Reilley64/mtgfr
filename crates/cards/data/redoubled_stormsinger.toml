# First strike
# Whenever this creature attacks, for each creature token you control that entered this turn, create a tapped and
# attacking token that's a copy of that token. At the beginning of the next end step, sacrifice those tokens.
name = "Redoubled Stormsinger"
otags = ["attack-trigger", "attacking-matters-self", "copy-token", "delayed-trigger", "repeatable-creature-tokens", "synergy-token-creature", "temporary-token", "tokenfall", "unnoted-tracked-information"]
oracle = "First strike\nWhenever this creature attacks, for each creature token you control that entered this turn, create a tapped and attacking token that's a copy of that token. At the beginning of the next end step, sacrifice those tokens."
set = "soc"
subtypes = ["Orc", "Wizard"]
keywords = ["first_strike"]

[cost]
generic = 2
red = 1

[kind]
type = "creature"
power = 3
toughness = 3

# Whenever this creature attacks, for each creature token you control that entered this turn,
# create a tapped and attacking token that's a copy of that token. At the beginning of the next
# end step, sacrifice those tokens.
[[abilities]]
timing = "attacks"

# for each creature token you control that entered this turn, create a tapped and attacking
# token that's a copy of that token. At the beginning of the next end step, sacrifice those
# tokens.
[[abilities.effects]]
type = "copy_each_entered_this_turn_token_tapped_attacking"
