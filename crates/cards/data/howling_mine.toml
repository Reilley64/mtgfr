# At the beginning of each player's draw step, if this artifact is untapped, that player draws an additional card.
name = "Howling Mine"
id = "d26b27db-a567-4631-b4b6-7294222fbdd1"
default_print = "26dba440-a2af-40c6-a126-4f7c031e9fd6"
otags = ["draw-engine", "each-player-draws", "group-hug", "symmetrical-draw", "vulnerable-to-tapping"]
oracle = "At the beginning of each player's draw step, if this artifact is untapped, that player draws an additional card."
set = "cmd"

[cost]
generic = 2

[kind]
type = "artifact"

# At the beginning of each player's draw step, if this artifact is untapped, that player draws an
# additional card.
[[abilities]]
timing = "each_draw_step"
condition = { type = "source_untapped" }

# if this artifact is untapped, that player draws an additional card.
[[abilities.effects]]
type = "conditional"
condition = { type = "source_untapped" }
then = [{ type = "draw", mode = "each_draw_step_player", count = 1 }]
