# Clash with an opponent. Counter target spell. If you win the clash, at the beginning of your next
# main phase, add {C} for each 1 mana in that spell's mana cost. (Each clashing player reveals the top
# card of their library, then puts that card on the top or bottom. A player wins if their card had a
# higher mana value.)
name = "Scattering Stroke"
id = "314a9604-34ec-4529-bd14-7b63be28669f"
default_print = "20652385-465f-408b-adea-13a14fb05642"
oracle = "Clash with an opponent. Counter target spell. If you win the clash, at the beginning of your next main phase, add {C} for each 1 mana in that spell's mana cost. (Each clashing player reveals the top card of their library, then puts that card on the top or bottom. A player wins if their card had a higher mana value.)"
set = "cmd"

[cost]
generic = 1
blue = 1

[kind]
type = "instant"

# Clash with an opponent. Counter target spell. If you win the clash, at the beginning of your next
# main phase, add {C} for each 1 mana in that spell's mana cost.
[[abilities]]
timing = "spell"

# Clash with an opponent.
[[abilities.effects]]
type = "dig"
mode = "clash"

# Counter target spell.
[[abilities.effects]]
type = "misc"
mode = "counter_target_spell"

# If you win the clash, at the beginning of your next main phase, add {C} for each 1 mana in that
# spell's mana cost.
[[abilities.effects]]
type = "conditional"
condition = { type = "won_clash" }
then = [{ type = "misc", mode = "schedule_colorless_mana_for_countered_spell_next_main_phase" }]
