# {T}, Sacrifice this land: Search your library for a basic land card, put it onto the battlefield tapped, then
# shuffle.
name = "Evolving Wilds"
id = "a75445d3-1303-4bb5-89ad-26ea93fecd48"
default_print = "3b52b2e9-31d1-4c9a-bf40-fc9c1eac7528"
oracle = "{T}, Sacrifice this land: Search your library for a basic land card, put it onto the battlefield tapped, then shuffle."
set = "cmd"

# A fetch-only land: no `produces`, so it has no tap-for-mana ability — it's played only to be
# sacrificed for the fetch below.
[kind]
type = "land"

# {T}, Sacrifice this land: Search your library for a basic land card, put it onto the battlefield
# tapped, then shuffle.
[[abilities]]
timing = "activated"
taps_self = true
sacrifice = "this"

# Search your library for a basic land card, put it onto the battlefield tapped, then shuffle.
[[abilities.effects]]
type = "dig"
mode = "search_library"
filter = "basic_land"
to_zone = "battlefield"
tapped = true
