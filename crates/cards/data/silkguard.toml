# Put a +1/+1 counter on each of up to X target creatures you control.
# Auras, Equipment, and modified creatures you control gain hexproof until end of turn. (Equipment, Auras you control,
# and counters are modifications.)
# Silkguard {X}{G} — an instant (soc). Oracle:
#   "Put a +1/+1 counter on each of up to X target creatures you control.
#    Auras, Equipment, and modified creatures you control gain hexproof until end of turn."
name = "Silkguard"
otags = ["combat-trick", "gives-hexproof", "multiple-targets", "protects-all", "protects-creature", "single-target-instant-sorcery", "strive", "support", "synergy-modified"]
oracle = "Put a +1/+1 counter on each of up to X target creatures you control.\nAuras, Equipment, and modified creatures you control gain hexproof until end of turn. (Equipment, Auras you control, and counters are modifications.)"
set = "soc"

[cost]
x = true
green = 1

[kind]
type = "instant"

# Put a +1/+1 counter on each of up to X target creatures you control.
[[abilities]]
timing = "spell"

# Put a +1/+1 counter on each of up to X target creatures you control.
[[abilities.effects]]
type = "put_counters"
count = 1
target = "creature_you_control"
targets = { min = 0, max = 0, x_scaled = true }

# modified creatures you control gain hexproof until end of turn.
[[abilities.effects]]
type = "pump_creatures_you_control_until_end_of_turn"
power = 0
toughness = 0
keywords = ["hexproof"]
filter = { modified = true, controller = "you" }

# Auras, Equipment ... you control gain hexproof until end of turn.
[[abilities.effects]]
type = "grant_keywords_to_permanents_you_control_until_end_of_turn"
keywords = ["hexproof"]
filter = { subtypes = ["Aura", "Equipment"], controller = "you" }
