# {X}: You may choose a creature card in your hand whose mana cost could be paid by some amount of, or all of, the mana
# you spent on {X}. If you do, you may cast that card face down as a 2/2 creature spell without paying its mana cost. If
# the creature that spell becomes as it resolves has not been turned face up and would assign or deal damage, be dealt
# damage, or become tapped, instead it's turned face up and assigns or deals damage, is dealt damage, or becomes tapped.
# Activate only as a sorcery.
name = "Illusionary Mask"
oracle = "{X}: You may choose a creature card in your hand whose mana cost could be paid by some amount of, or all of, the mana you spent on {X}. If you do, you may cast that card face down as a 2/2 creature spell without paying its mana cost. If the creature that spell becomes as it resolves has not been turned face up and would assign or deal damage, be dealt damage, or become tapped, instead it's turned face up and assigns or deals damage, is dealt damage, or becomes tapped. Activate only as a sorcery."
set = "lea"
approximates = "the CR 615 turn-face-up-on-interaction replacement is unmodeled: the {X} ability casts the creature face down (clause 1, faithful), but a face-down creature this way that would assign or deal damage, be dealt damage, or become tapped is not first turned face up (the printed \"instead it's turned face up and ...\" — a per-object replacement consulted at the two damage chokes and the tap choke). Also, the \"mana you spent on {X} could pay its cost\" color-subset test is approximated as mana value <= X (see the effect's ponytail). Upgrade path: a per-permanent \"turn face up when it would interact\" flag consulted at those chokes; and a spent-mana color-pool subset check."

[cost]
generic = 2

[kind]
type = "artifact"

