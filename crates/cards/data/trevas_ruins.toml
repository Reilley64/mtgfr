# When this land enters, sacrifice it unless you return a non-Lair land you control to its
# owner's hand.
# {T}: Add {G}, {W}, or {U}.
name = "Treva's Ruins"
oracle = "When this land enters, sacrifice it unless you return a non-Lair land you control to its owner's hand.\n{T}: Add {G}, {W}, or {U}."
set = "soc"
identity = ["green", "white", "blue"]

[kind]
type = "land"
subtypes = ["Lair"]

# When this land enters, sacrifice it unless you return a non-Lair land you control to its
# owner's hand.
[[abilities]]
timing = "etb"

# sacrifice it unless you return a non-Lair land you control to its owner's hand.
[[abilities.effects]]
type = "sacrifice_self_unless_return_land"
filter = { types = "land", controller = "you", nonlair = true }

# {T}: Add {G}, {W}, or {U}.
[[abilities]]
timing = "activated"
taps_self = true

# Add {G}, {W}, or {U}.
[[abilities.effects]]
type = "add_mana"
mana = [["green", "white", "blue"]]
