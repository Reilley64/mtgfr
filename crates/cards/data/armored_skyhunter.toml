# Flying
# Whenever this creature attacks, look at the top six cards of your library. You may put an Aura or Equipment card from
# among them onto the battlefield. If an Equipment is put onto the battlefield this way, you may attach it to a creature
# you control. Put the rest of those cards on the bottom of your library in a random order.
name = "Armored Skyhunter"
otags = ["attack-trigger", "attacking-matters-self", "evasion", "impulse-artifact-equipment", "impulse-enchantment-aura", "impulse-onto-battlefield", "quick-equip", "repeatable-impulse", "synergy-aura", "synergy-equipment"]
oracle = "Flying\nWhenever this creature attacks, look at the top six cards of your library. You may put an Aura or Equipment card from among them onto the battlefield. If an Equipment is put onto the battlefield this way, you may attach it to a creature you control. Put the rest of those cards on the bottom of your library in a random order."
set = "soc"
subtypes = ["Cat", "Knight"]
keywords = ["flying"]

[cost]
generic = 3
white = 1

[kind]
type = "creature"
power = 3
toughness = 3

# Whenever this creature attacks, look at the top six cards of your library. You may put an Aura
# or Equipment card from among them onto the battlefield. If an Equipment is put onto the
# battlefield this way, you may attach it to a creature you control. Put the rest of those cards
# on the bottom of your library in a random order.
[[abilities]]
timing = "attacks"

# look at the top six cards of your library. You may put an Aura or Equipment card from among
# them onto the battlefield. … Put the rest of those cards on the bottom of your library in a
# random order.
[[abilities.effects]]
type = "look_at_top"
count = 6
filter = "aura_or_equipment"
up_to = 1
min = 0
dest = "battlefield"
rest = "bottom"
