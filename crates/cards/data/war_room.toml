# {T}: Add {C}.
# {3}, {T}, Pay life equal to the number of colors in your commanders' color identity: Draw a card.
# War Room (SOC): "{T}: Add {C}. {3}, {T}, Pay life equal to the number of colors in your
# commanders' color identity: Draw a card."
name = "War Room"
id = "71c52bf5-2a5d-488e-8b15-7ef290e4b77d"
default_print = "0775b4be-881c-4832-8954-d961064315b6"
