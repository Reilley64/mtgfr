# Cycling {2}{G} ({2}{G}, Discard this card: Draw a card.)
# When you cycle this card, you may search your library for a basic land card, reveal that card, put it into your
# hand, then shuffle. (Do this before you draw.)
name = "Krosan Tusker"
oracle = "Cycling {2}{G} ({2}{G}, Discard this card: Draw a card.)\nWhen you cycle this card, you may search your library for a basic land card, reveal that card, put it into your hand, then shuffle. (Do this before you draw.)"
set = "cmm"
subtypes = ["Boar", "Beast"]
cycling = { generic = 2, green = 1 }

[cost]
generic = 5
