# [Defacing Duskmage]
# Deathtouch
# Whenever an opponent draws their second card each turn, this creature becomes prepared. (While it's prepared, you may
# cast a copy of its spell. Doing so unprepares it.)
# [Vandal's Edit]
# Draw two cards. Each player loses 2 life.
# Defacing Duskmage // Vandal's Edit (soc), a "prepare" double-faced card: {W}{B} 2/2 Dog
# Warlock with deathtouch whose front-face trigger makes it become prepared; while prepared, its
# controller may cast a copy of the {1}{W}{B} Vandal's Edit instant below, which unprepares it.
name = "Defacing Duskmage"
id = "27c366cf-00d7-47d4-9577-736bfc4a3b81"
default_print = "c35a1c6f-1656-4619-9ab8-40044c857a7f"
otags = ["alliteration", "cycle-soc-two-color-prepare", "draw-engine", "draw-hate", "gives-castable-from-exile", "group-slug", "hand-positive", "life-for-cards", "opponent-loses-life", "repeatable-pure-draw", "second-draw-matters", "triggered-ability"]
oracle = "Deathtouch\nWhenever an opponent draws their second card each turn, this creature becomes prepared. (While it's prepared, you may cast a copy of its spell. Doing so unprepares it.) // Draw two cards. Each player loses 2 life."
set = "soc"
subtypes = ["Dog", "Warlock"]
keywords = ["deathtouch"]

[cost]
white = 1
black = 1

[kind]
type = "creature"
power = 2
toughness = 2

# Whenever an opponent draws their second card each turn, this creature becomes prepared.
[[abilities]]
timing = "player_draws"
drawer = "opponent"
nth_each_turn = 2

# this creature becomes prepared.
[[abilities.effects]]
type = "misc"
mode = "become_prepared"

# Back face — Vandal's Edit ({1}{W}{B} instant): "Draw two cards. Each player loses 2 life."
[back]
name = "Vandal's Edit"
set = "soc"

[back.cost]
generic = 1
white = 1
black = 1

[back.kind]
type = "instant"

# ponytail: "each player loses 2 life" (CR-simultaneous) is composed as each-opponent-then-you
# sequential — the resulting life totals are identical and no pool card observes the ordering.
[[back.abilities]]
timing = "spell"

# Draw two cards.
[[back.abilities.effects]]
type = "draw"
mode = "cards"
count = 2

# Each player loses 2 life (opponents' share).
[[back.abilities.effects]]
type = "life"
mode = "each_opponent_loses"
amount = 2

# Each player loses 2 life (the caster's own share).
[[back.abilities.effects]]
type = "life"
mode = "lose"
amount = 2
