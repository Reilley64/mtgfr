# At the beginning of each upkeep, if you control no Snakes, create a 1/1 black Snake creature token with deathtouch.
# Ophiomancer (soc). Real oracle text:
#   "At the beginning of each upkeep, if you control no Snakes, create a 1/1 black Snake
#    creature token with deathtouch."
name = "Ophiomancer"
otags = ["intervening-if-clause", "per-player", "repeatable-creature-tokens"]
oracle = "At the beginning of each upkeep, if you control no Snakes, create a 1/1 black Snake creature token with deathtouch."
set = "soc"
subtypes = ["Human", "Shaman"]

[cost]
generic = 2
black = 1

[kind]
type = "creature"
power = 2
toughness = 2

# At the beginning of each upkeep, if you control no Snakes, create a 1/1 black Snake creature
# token with deathtouch.
[[abilities]]
timing = "each_upkeep"

[abilities.condition]
type = "you_control_no_subtype"
subtypes = ["Snake"]

# create a 1/1 black Snake creature token with deathtouch.
[[abilities.effects]]
type = "create_token"
count = 1

[abilities.effects.token]
name = "Snake"
subtypes = ["Snake"]
keywords = ["deathtouch"]

[abilities.effects.token.kind]
type = "creature"
power = 1
toughness = 1
