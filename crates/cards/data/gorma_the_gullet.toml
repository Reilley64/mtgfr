# Nontoken creatures you control enter with an additional +1/+1 counter on them for each creature
# that died under your control this turn.
[[abilities]]
timing = "static"

# Nontoken creatures you control enter with an additional +1/+1 counter on them for each
# creature that died under your control this turn
[[abilities.effects]]
type = "static"
mode = "creatures_you_control_enter_with_counters"
filter = { types = "creature", token = "nontoken" }
count = "creatures_died_this_turn"
