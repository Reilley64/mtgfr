# Lifelink
# Whenever another creature you control dies, put a +1/+1 counter on Gorma.
# Nontoken creatures you control enter with an additional +1/+1 counter on them for each creature that died under your
# control this turn.
# Gorma, the Gullet (soc). Real oracle text:
#   "Lifelink
#    Whenever another creature you control dies, put a +1/+1 counter on Gorma.
#    Nontoken creatures you control enter with an additional +1/+1 counter on them for each
#    creature that died under your control this turn."
name = "Gorma, the Gullet"
id = "ae5f30cc-a22e-4fbb-9510-e9429de3623c"
default_print = "86f97dd8-8647-4938-aee0-690bb715f88b"
otags = ["alliteration", "cycle-soc-alt-commander", "death-trigger", "gains-pp-counters", "gives-pp-counters", "morbid", "repeatable-lifegain", "repeatable-pp-counters", "unique-type-line", "unnoted-tracked-information"]
oracle = "Lifelink\nWhenever another creature you control dies, put a +1/+1 counter on Gorma.\nNontoken creatures you control enter with an additional +1/+1 counter on them for each creature that died under your control this turn."
set = "soc"
subtypes = ["Pest", "Frog"]
legendary = true
keywords = ["lifelink"]

[cost]
generic = 1
black = 1
green = 1

