name = "Fabled Passage"
id = "0c85b8f7-0bd0-4680-9ec5-d4b110460a54"
default_print = "62ef854d-ec9e-443d-a4ba-4b2875ed3fe7"
otags = ["activated-ability", "conditional-tapland", "fetchland", "lands-matter", "tutor-land-basic"]
oracle = "{T}, Sacrifice this land: Search your library for a basic land card, put it onto the battlefield tapped, then shuffle. Then if you control four or more lands, untap that land."
set = "msc"

[kind]
type = "land"

# {T}, Sacrifice this land: Search your library for a basic land card, put it onto the battlefield
# tapped, then shuffle. Then if you control four or more lands, untap that land.
[[abilities]]
timing = "activated"
taps_self = true
sacrifice = "this"

# Search your library for a basic land card, put it onto the battlefield tapped, then shuffle.
[[abilities.effects]]
type = "search_library"
filter = "basic_land"
to_zone = "battlefield"
tapped = true

# Then if you control four or more lands, untap that land.
[[abilities.effects]]
type = "conditional"
condition = { type = "you_control_lands", at_least = 4 }
then = [
        { type = "untap_searched_land" },
    ]
