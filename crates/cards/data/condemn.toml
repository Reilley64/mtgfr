# Put target attacking creature on the bottom of its owner's library. Its controller gains life equal to its
# toughness.
name = "Condemn"
otags = ["lifegain-rider", "removal-tuck", "single-target-instant-sorcery", "spot-removal"]
oracle = "Put target attacking creature on the bottom of its owner's library. Its controller gains life equal to its toughness."
set = "soc"

[cost]
white = 1

[kind]
type = "instant"

# Put target attacking creature on the bottom of its owner's library. Its controller gains life
# equal to its toughness.
[[abilities]]
timing = "spell"

# Its controller gains life equal to its toughness. (Read before the tuck moves the creature off
# the battlefield — same last-known-information ordering as Swords to Plowshares' power rider.)
[[abilities.effects]]
type = "gain_life_target_controller"
amount = "target_toughness"

# Put target attacking creature on the bottom of its owner's library.
[[abilities.effects]]
type = "tuck_permanent_into_library"
target = { permanent = { types = "creature", attacking = true } }
