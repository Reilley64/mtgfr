# As an additional cost to cast this spell, pay X life.
# All creatures get -X/-X until end of turn.
# "As an additional cost to cast this spell, pay X life. All creatures get -X/-X until end of
#  turn." — {2}{B} sorcery.
#
# ponytail: `x = true` is the CR 601.2b chooser (X is chosen when the spell is cast); `[cost.
# additional] pay_life = "x"` redirects that chosen X to the CR 601.2f additional cost — paid as
# life, not mana — instead of folding it into the mana cost.
name = "Toxic Deluge"
id = "afaef788-34d1-460b-b884-9d7ae6ddeb18"
default_print = "de5afccc-8d42-4bd6-b068-b9ea2361655e"
otags = ["life-payment", "removal-toughness", "sweeper", "symmetrical"]
oracle = "As an additional cost to cast this spell, pay X life.\nAll creatures get -X/-X until end of turn."
set = "msc"

[cost]
generic = 2
black = 1
x = true

[cost.additional]
pay_life = "x"

[kind]
type = "sorcery"

# All creatures get -X/-X until end of turn.
[[abilities]]
timing = "spell"

# All creatures get -X/-X until end of turn.
[[abilities.effects]]
type = "pump"
mode = "weaken_each_creature"
power = "x"
toughness = "x"
