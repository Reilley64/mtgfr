# As this land enters, you may reveal a Mountain or Plains card from your hand. If you don't, this land enters tapped.
# {T}: Add {R} or {W}.
# ponytail: the reveal is modeled as an automatic hand scan (see Condition::HandHasLandWithSubtype)
# rather than a real choice — revealing is strictly better with no downside, so there's nothing to
# decide.
name = "Furycalm Snarl"
otags = ["activated-ability", "cycle-stx-reveal-land", "synergy-mountain", "synergy-plains"]
oracle = "As this land enters, you may reveal a Mountain or Plains card from your hand. If you don't, this land enters tapped.\n{T}: Add {R} or {W}."
set = "msc"
identity = ["red", "white"]

[kind]
type = "land"
produces = ["red", "white"]

[enters_tapped_unless]
type = "hand_has_land_with_subtype"
subtypes = ["Mountain", "Plains"]
