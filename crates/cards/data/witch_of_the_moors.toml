# Deathtouch
# At the beginning of your end step, if you gained life this turn, each opponent sacrifices a creature of their choice
# and you return up to one target creature card from your graveyard to your hand.
name = "Witch of the Moors"
id = "7ad97dd9-1342-4ed4-bea9-1bb21d748e04"
default_print = "d9367aa0-2da2-4ed5-b52a-c52e40a00adf"
otags = ["infusion", "intervening-if-clause", "inverted-effects", "multi-removal", "regrowth-creature", "removal-creature", "removal-sacrifice", "repeatable-card-advantage", "repeatable-removal", "spot-removal"]
oracle = "Deathtouch\nAt the beginning of your end step, if you gained life this turn, each opponent sacrifices a creature of their choice and you return up to one target creature card from your graveyard to your hand."
set = "soc"
subtypes = ["Human", "Warlock"]
keywords = ["deathtouch"]

[cost]
generic = 3
black = 2

[kind]
type = "creature"
power = 4
toughness = 4

# At the beginning of your end step, if you gained life this turn, each opponent sacrifices a
# creature of their choice and you return up to one target creature card from your graveyard to
# your hand.
[[abilities]]
timing = "end_step"

[abilities.condition]
type = "you_gained_life_this_turn"

# each opponent sacrifices a creature of their choice
[[abilities.effects]]
type = "each_player_sacrifices"
scope = "each_opponent"
filter = "creature"

# and you return up to one target creature card from your graveyard to your hand.
[[abilities.effects]]
type = "may_return_from_graveyard"
filter = "creature"
