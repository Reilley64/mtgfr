# Prophetic Bolt deals 4 damage to any target. Look at the top four cards of your library. Put one of those cards
# into your hand and the rest on the bottom of your library in any order.
# ponytail: "the rest on the bottom of your library in any order" — the bottom of the library is
# hidden, so the order among bottomed cards is unobservable; a fixed (PRNG-shuffled) order stands
# in for it (same shortcut Dig Through Time's `look_at_top` takes elsewhere in the pool).
name = "Prophetic Bolt"
id = "d5e4bf5e-1a66-4315-8c82-640c27977b88"
default_print = "9f482559-c09f-4261-9715-76fc11014a20"
oracle = "Prophetic Bolt deals 4 damage to any target. Look at the top four cards of your library. Put one of those cards into your hand and the rest on the bottom of your library in any order."
set = "cmd"

[cost]
generic = 3
blue = 1
red = 1

[kind]
type = "instant"

# Prophetic Bolt deals 4 damage to any target. Look at the top four cards of your library. Put one of those cards into
# your hand and the rest on the bottom of your library in any order.
[[abilities]]
timing = "spell"

# Prophetic Bolt deals 4 damage to any target.
[[abilities.effects]]
type = "deal_damage"
amount = 4
target = "any"

# Look at the top four cards of your library. Put one of those cards into your hand and the rest on the bottom of
# your library in any order.
[[abilities.effects]]
type = "look_at_top"
count = 4
up_to = 1
min = 1
dest = "hand"
rest = "bottom"
