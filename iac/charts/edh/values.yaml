serverImage: ""
webImage: ""
namespace: edh
apiActiveInstanceId: edh-api
apiTerminationGraceSeconds: 86400
apiHeadlessService: edh-api-headless
# TOON action traces at /logs — one PVC per apiActiveInstanceId (kept across Argo prune).
apiLogsPvcSize: 1Gi
# Empty = cluster default StorageClass (k3s local-path).
apiLogsStorageClass: ""
cookieDomain: ""
corsOrigin: ""
logLevel: info
dbSecretName: mtgfr-db
# OTLP HTTP → Alloy (empty = no export; local/dev).
otelExporterOtlpEndpoint: "http://alloy.observability.svc:4318"
# BFF proxies browser Faro collect to Alloy's faro.receiver.
faroCollectUpstream: "http://alloy.observability.svc:12347/collect"
