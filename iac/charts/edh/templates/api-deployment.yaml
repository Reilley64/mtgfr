apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.apiActiveInstanceId }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.apiActiveInstanceId }}
    app.kubernetes.io/part-of: mtgfr
    mtgfr.io/component: api
    mtgfr.io/api-role: active
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.apiActiveInstanceId }}
  template:
    metadata:
      labels:
        app: {{ .Values.apiActiveInstanceId }}
        app.kubernetes.io/part-of: mtgfr
        mtgfr.io/component: api
        mtgfr.io/api-role: active
    spec:
      # Per-pod A records under the headless Service require hostname+subdomain (K8s DNS).
      # hostname = instance id (stable across pod restarts; unique across drain generations —
      # replicas stay 1 per Deployment). Without this, POD_DNS FQDNs ENOTFOUND even when the
      # pod is Ready.
      hostname: {{ .Values.apiActiveInstanceId | quote }}
      subdomain: {{ .Values.apiHeadlessService | quote }}
      terminationGracePeriodSeconds: {{ .Values.apiTerminationGraceSeconds }}
      # local-path PVC mounts as root; fsGroup lets nonroot (65532) write action traces.
      securityContext:
        fsGroup: 65532
      containers:
        - name: edh-api
          image: {{ .Values.serverImage | quote }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
            - containerPort: 50051
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: GRPC_PORT
              value: "50051"
            - name: COOKIE_SECURE
              value: "true"
            - name: COOKIE_DOMAIN
              value: {{ .Values.cookieDomain | quote }}
            - name: CORS_ORIGIN
              value: {{ .Values.corsOrigin | quote }}
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otelExporterOtlpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: "edh-api"
            - name: INSTANCE_ID
              value: {{ .Values.apiActiveInstanceId | quote }}
            - name: DRAIN
              value: "false"
            - name: VERSION
              value: {{ .Values.serverImage | quote }}
            - name: ACTION_LOG_DIR
              value: "/logs"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_DNS
              value: "{{ .Values.apiActiveInstanceId }}.{{ .Values.apiHeadlessService }}.$(POD_NAMESPACE).svc.cluster.local"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbSecretName }}
                  key: DATABASE_URL
          volumeMounts:
            - name: action-logs
              mountPath: /logs
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: action-logs
          persistentVolumeClaim:
            claimName: {{ .Values.apiActiveInstanceId }}-logs
